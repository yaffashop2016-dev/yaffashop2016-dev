                                        </div>
                                    </div>

                                    {/* Batch Info - 2 rows */}
                                    <div className="grid grid-cols-6 gap-2 border-t border-purple-200 pt-2">
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold mb-0.5 text-teal-600">批號</label>
                                            <input className="border border-teal-200 p-1.5 rounded-lg w-full bg-teal-50 focus:bg-white text-sm" placeholder="未填則自動生成" value={currentItem.batchNo} onChange={e => setCurrentItem({...currentItem, batchNo: e.target.value})} />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold mb-0.5 text-gray-500">製造日期</label>
                                            <input type="date" className="border border-gray-200 p-1.5 rounded-lg w-full bg-white text-sm" value={currentItem.mfgDate} onChange={e => setCurrentItem({...currentItem, mfgDate: e.target.value})} />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold mb-0.5 text-gray-500">有效日期</label>
                                            <input type="date" className="border border-gray-200 p-1.5 rounded-lg w-full bg-white text-sm" value={currentItem.expDate} onChange={e => setCurrentItem({...currentItem, expDate: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-2">
                                        {mode === 'existing' && <button onClick={() => setCurrentItem({name: '', spec: '', cost: 0, qty: 1, retail: 0, batchNo: '', mfgDate: '', expDate: ''})} className="text-xs text-gray-400 underline hover:text-gray-600">重選</button>}
                                        <button onClick={confirmAddItem} className="flex-1 bg-purple-400 text-white py-1.5 rounded-lg hover:bg-purple-500 text-xs font-bold transition">
                                            加入清單
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Table - expanded */}
                        <div className="flex-1 overflow-auto rounded-lg border border-gray-100 min-h-[200px]">
                            <table className="w-full text-xs text-left macaron-table">
                                <thead className="sticky top-0 z-10 bg-gray-50">
                                    <tr>
                                        <th className="p-1.5">類型</th>
                                        <th className="p-1.5">品名/批號</th>
                                        <th className="p-1.5 text-right">數量</th>
                                        <th className="p-1.5 text-right">成本</th>
                                        <th className="p-1.5 text-right">小計</th>
                                        <th className="p-1.5 text-center w-8">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {cart.map((c, idx) => (
                                        <tr key={idx} className="border-b border-gray-50 hover:bg-gray-50/50">
                                            <td className="p-1.5"><span className={`inline text-[10px] px-1.5 py-0.5 rounded-full font-bold ${c.type === 'new' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}`}>{c.type === 'new' ? '新' : '補'}</span></td>
                                            <td className="p-1.5">
                                                <div className="font-bold text-gray-700">{c.name}</div>
                                                <div className="text-[10px] text-gray-400">{c.spec}</div>
                                                <div className="text-[9px] text-teal-600 font-semibold">批: {c.batchNo || 'Auto'}</div>
                                            </td>
                                            <td className="p-1.5 text-right font-bold">{c.inboundQty}</td>
                                            <td className="p-1.5 text-right font-bold">{c.inboundCost}</td>
                                            <td className="p-1.5 text-right text-gray-600 font-bold">{formatCurrency(c.inboundQty * c.inboundCost)}</td>
                                            <td className="p-1.5 text-center">
                                                <button 
                                                    onClick={() => setCart(cart.filter((_, i) => i !== idx))} 
                                                    className="btn-delete p-1 text-red-300 hover:text-red-500 rounded transition" 
                                                    title="移除此項"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {cart.length === 0 && <div className="p-8 text-center text-gray-300 text-sm">加入商品後會顯示在此</div>}
                        </div>
                        
                        <div className="mt-3 flex justify-between items-center pt-3 border-t border-gray-100">
                            <div className="text-sm font-bold text-gray-600">小計: <span className="text-purple-500 text-lg">{formatCurrency(cart.reduce((acc, c) => acc + (c.inboundQty * c.inboundCost), 0))}</span></div>
                            <div className="flex gap-2">
                                <button onClick={previewCurrent} className="bg-white border border-purple-200 text-purple-500 px-4 py-2 rounded-lg hover:bg-purple-50 text-sm font-bold flex items-center gap-1 transition">
                                    <i data-lucide="sheet" className="w-3 h-3"></i> 匯出XLSX
                                </button>
                                <button onClick={submitInbound} className="bg-purple-400 text-white px-6 py-2 rounded-lg hover:bg-purple-500 text-sm font-bold shadow-md shadow-purple-200 transition transform active:scale-95">確認進貨</button>
                            </div>
                        </div>
                    </div>

                    {/* Right sidebar - expanded for history */}
                    <div className="col-span-2 macaron-card p-4 h-full overflow-auto flex flex-col">
                        <div className="flex justify-between items-center mb-3 pb-3 border-b border-gray-100">
                            <h4 className="font-bold text-gray-700 flex items-center gap-1 text-sm"><i data-lucide="history" className="w-4 h-4"></i> 進貨歷史</h4>
                            <button onClick={exportInboundHistory} className="text-xs bg-green-100 text-green-700 px-2.5 py-1.5 rounded-full font-bold hover:bg-green-200 flex items-center gap-1" title="匯出所有進貨明細">
                                <i data-lucide="sheet" className="w-3 h-3"></i> 匯出
                            </button>
                        </div>

                        {/* Filter & Group Controls */}
                        <div className="mb-3 pb-3 border-b border-gray-100 space-y-2">
                            <div className="grid grid-cols-2 gap-2">
                                <input 
                                    type="text"
                                    placeholder="搜尋單號/備註..."
                                    value={inboundFilterKeyword}
                                    onChange={e => setInboundFilterKeyword(e.target.value)}
                                    className="text-xs border p-1.5 rounded-lg outline-none focus:ring-1 focus:ring-purple-200"
                                />
                                <div>
                                    <input
                                        type="text"
                                        list="inboundSupplierList"
                                        placeholder="搜尋供應商 (輸入一個字即可)"
                                        value={inboundFilterSupplier}
                                        onChange={e => setInboundFilterSupplier(e.target.value)}
                                        className="text-xs border p-1.5 rounded-lg w-full outline-none focus:ring-1 focus:ring-purple-200"
                                    />
                                    <datalist id="inboundSupplierList">
                                        {suppliers
                                            .filter(s => inboundFilterSupplier === '' || s.name.toLowerCase().includes(inboundFilterSupplier.toLowerCase()))
                                            .slice(0, 20)
                                            .map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                                    </datalist>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <label className="flex items-center gap-1 text-xs cursor-pointer">
                                    <input 
                                        type="checkbox"
                                        checked={inboundGroupByMonth}
                                        onChange={e => setInboundGroupByMonth(e.target.checked)}
                                        className="w-3 h-3"
                                    />
                                    <span className="font-bold text-gray-600">按月份分組</span>
                                </label>
                            </div>
                        </div>

                        <div className="space-y-2 flex-1 overflow-y-auto">
                            {(() => {
                                const inTx = transactions.filter(t => t.type === 'IN');
                                const filtered = inTx.filter(t => {
                                    const matchKeyword = inboundFilterKeyword === '' || t.docNo.includes(inboundFilterKeyword) || (t.note || '').includes(inboundFilterKeyword);
                                    const matchSupplier = inboundFilterSupplier === '' || t.partner.toLowerCase().includes(inboundFilterSupplier.toLowerCase());
                                    return matchKeyword && matchSupplier;
                                });

                                if (filtered.length === 0) {
                                    return <div className="text-center text-gray-300 text-sm py-8">尚無進貨紀錄</div>;
                                }

                                if (inboundGroupByMonth) {
                                    // Group by month
                                    const grouped = {};
                                    filtered.forEach(t => {
                                        const monthKey = t.date.substring(0, 7); // YYYY-MM
                                        if (!grouped[monthKey]) grouped[monthKey] = [];
                                        grouped[monthKey].push(t);
                                    });

                                    const sortedMonths = Object.keys(grouped).sort().reverse();

                                    return sortedMonths.map(monthKey => {
                                        const isExpanded = expandedMonths[monthKey] !== false;
                                        const items = grouped[monthKey];
                                        return (
                                            <div key={monthKey} className="border border-gray-100 rounded-lg overflow-hidden">
                                                <button
                                                    onClick={() => setExpandedMonths(prev => ({...prev, [monthKey]: !isExpanded}))}
                                                    className="w-full flex justify-between items-center p-2 hover:bg-purple-50 transition bg-gradient-to-r from-purple-50 to-white font-bold text-sm"
                                                >
                                                    <span className="text-purple-700 flex items-center gap-2">
                                                        <i data-lucide={isExpanded ? "chevron-down" : "chevron-right"} className="w-4 h-4"></i>
                                                        {monthKey} ({items.length} 筆)
                                                    </span>
                                                    <span className="text-gray-500 text-xs">{formatCurrency(items.reduce((acc, t) => acc + t.total, 0))}</span>
                                                </button>
                                                {isExpanded && (
                                                    <div className="space-y-1 p-2 bg-gray-50/50">
                                                        {items.map(t => (
                                                            <div key={t.id} className="border border-gray-100 p-2 rounded text-xs bg-white hover:shadow-md transition">
                                                                <div className="flex justify-between font-bold mb-0.5">
                                                                    <span className="text-purple-600 text-sm">{t.docNo}</span>
                                                                    <span className="text-gray-400 text-[9px]">{t.date}</span>
                                                                </div>
                                                                <div className="text-gray-700 font-semibold text-xs mb-0.5">{t.partner}</div>
                                                                {t.note && <div className="text-[9px] bg-purple-100 text-purple-700 px-1 py-0.5 rounded inline-block mb-1">{t.note}</div>}
                                                                <div className="flex justify-between text-[9px] text-gray-500 mb-1">
                                                                    <span>{t.items.length} 項目</span>
                                                                    <span className="font-bold text-gray-700">{formatCurrency(t.total)}</span>
                                                                </div>
                                                                <div className="flex gap-1 flex-wrap">
                                                                    <button onClick={() => onPreview(t)} className="flex-1 p-1 text-[9px] bg-purple-100 text-purple-600 rounded hover:bg-purple-200 font-bold transition" title="匯出XLSX">
                                                                        <i data-lucide="file-spreadsheet" className="inline w-3 h-3 mr-0.5"></i> 匯出XLSX
                                                                    </button>
                                                                    <button onClick={() => openEditModal(t)} className="flex-1 p-1 text-[9px] bg-blue-100 text-blue-600 rounded hover:bg-blue-200 font-bold transition" title="修改">
                                                                        <i data-lucide="edit-3" className="inline w-3 h-3 mr-0.5"></i> 修改
                                                                    </button>
                                                                    <button onClick={() => handleVoid(t)} className="flex-1 p-1 text-[9px] bg-red-100 text-red-600 rounded hover:bg-red-200 font-bold transition" title="作廢">
                                                                        <i data-lucide="x-circle" className="inline w-3 h-3 mr-0.5"></i> 作廢
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    });
                                } else {
                                    // Show flat list
                                    return filtered.map(t => (
                                        <div key={t.id} className="border border-gray-100 p-3 rounded-lg text-xs hover:shadow-md transition bg-gradient-to-br from-purple-50/50 to-white">
                                            <div className="flex justify-between font-bold mb-1">
                                                <span className="text-purple-600 text-sm font-bold">{t.docNo}</span>
                                                <span className="text-gray-400 text-[10px]">{t.date}</span>
                                            </div>
                                            <div className="text-gray-700 font-semibold mb-1">{t.partner}</div>
                                            {t.note && <div className="text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded inline-block mb-1">{t.note}</div>}
                                            <div className="flex justify-between text-[10px] text-gray-500 mb-2">
                                                <span>{t.items.length} 項目</span>
                                                <span className="font-bold text-gray-700">{formatCurrency(t.total)}</span>

        const InventoryView = ({ inventory, setInventory }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [editItem, setEditItem] = useState(null);
            const [unboxItem, setUnboxItem] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [newItemData, setNewItemData] = useState({
                name: '',
                spec: '',
                qty: 0,
                location: '',
                avgCost: 0,
                retailPrice: 0,
                note: ''
            });

            const handleDelete = (id) => {
                const item = inventory.find(i => i.id === id);
                if (item.qty > 0) {
                    if (!confirm(`警告：此項目 (${item.name}) 尚有庫存 ${item.qty}。確定要刪除嗎？`)) return;
                } else {
                    if (!confirm(`確定要刪除 ${item.name} 嗎？`)) return;
                }
                setInventory(prev => prev.filter(i => i.id !== id));
            };

            const handleAddNew = (e) => {
                e.preventDefault();
                if (!newItemData.name.trim()) {
                    alert('請輸入品名');
                    return;
                }
                
                const newItem = {
                    id: generateId(),
                    name: newItemData.name,
                    spec: newItemData.spec,
                    qty: Number(newItemData.qty) || 0,
                    location: newItemData.location,
                    avgCost: Number(newItemData.avgCost) || 0,
                    retailPrice: Number(newItemData.retailPrice) || 0,
                    note: newItemData.note,
                    supplier: '',
                    isChemical: false,
                    chemExpDate: '',
                    chemReminderDate: '',
                    chemNote: ''
                };
                
                setInventory(prev => [...prev, newItem]);
                setIsAdding(false);
                setNewItemData({
                    name: '',
                    spec: '',
                    qty: 0,
                    location: '',
                    avgCost: 0,
                    retailPrice: 0,
                    note: ''
                });
                alert(`已新增品項：${newItem.name}`);
            };

            const handleSaveEdit = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newRetail = parseInt(formData.get('retailPrice'), 10);
                
                const updatedItem = {
                    ...editItem,
                    name: formData.get('name'),
                    spec: formData.get('spec'),
                    location: formData.get('location'),
                    avgCost: Number(formData.get('avgCost')),
                    retailPrice: isNaN(newRetail) ? 0 : newRetail,
                    qty: Number(formData.get('qty')),
                    note: formData.get('note') 
                };

                setInventory(prev => prev.map(i => i.id === editItem.id ? updatedItem : i));
                setEditItem(null);
            };

            const handleRepack = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const splitQty = Number(formData.get('splitQty'));
                const targetQty = Number(formData.get('targetQty')); 
                const targetName = formData.get('targetName');
                const targetSpec = formData.get('targetSpec');
                
                if (splitQty > unboxItem.qty) return alert('分裝數量超過來源庫存');

                const newInventory = inventory.map(item => {
                    if(item.id === unboxItem.id) {
                        return { ...item, qty: item.qty - splitQty };
                    }
                    return item;
                });

                const totalValueMoved = splitQty * unboxItem.avgCost;
                const newCost = totalValueMoved / targetQty;

                const existTargetIdx = newInventory.findIndex(i => i.name === targetName && i.spec === targetSpec);
                
                if (existTargetIdx >= 0) {
                    const target = newInventory[existTargetIdx];
                    const totalVal = (target.qty * target.avgCost) + totalValueMoved;
                    const totalQty = target.qty + targetQty;
                    newInventory[existTargetIdx] = {
                        ...target,
                        qty: totalQty,
                        avgCost: totalQty > 0 ? totalVal / totalQty : 0
                    };
                } else {
                    newInventory.push({
                        ...unboxItem, 
                        id: generateId(),
                        name: targetName,
                        spec: targetSpec,
                        qty: targetQty,
                        avgCost: newCost,
                        retailPrice: Math.ceil(newCost * 1.5) 
                    });
                }

                setInventory(newInventory);
                setUnboxItem(null);
                alert(`分裝完成！已將 ${splitQty} 個 ${unboxItem.name} 轉換為 ${targetQty} 個 ${targetName}`);
            };

            const exportAllInventory = () => {
                const data = inventory.map(i => ({
                    '產品名稱': i.name,
                    '規格': i.spec,
                    '庫存數量': i.qty,
                    '平均成本': Number(i.avgCost).toFixed(3),
                    '門市售價': i.retailPrice,
                    '儲位': i.location,

        // ============= 平台管理組件 =============
        const PlatformManager = ({ platforms = [], setPlatforms, showNotification }) => {
            const safePlatforms = Array.isArray(platforms) ? platforms : [];
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                name: '', activityFeeRate: 0, paymentFeeRate: 2, platformFeeRate: 5, 
                packagingCost: 0, shippingCost: 0, notes: '',
                additionalFees: [], fixedCosts: []
            });

            const resetForm = () => {
                setEditingId(null);
                setFormData({ name: '', activityFeeRate: 0, paymentFeeRate: 2, platformFeeRate: 5, 
                    packagingCost: 0, shippingCost: 0, notes: '', additionalFees: [], fixedCosts: [] });
            };

            const addAdditionalFee = () => {
                setFormData(prev => ({
                    ...prev,
                    additionalFees: [...(prev.additionalFees || []), { name: '', rate: 0 }]
                }));
            };

            const updateAdditionalFee = (idx, field, value) => {
                setFormData(prev => {
                    const updated = [...(prev.additionalFees || [])];
                    updated[idx] = { ...updated[idx], [field]: value };
                    return { ...prev, additionalFees: updated };
                });
            };

            const removeAdditionalFee = (idx) => {
                setFormData(prev => ({
                    ...prev,
                    additionalFees: prev.additionalFees.filter((_, i) => i !== idx)
                }));
            };

            const addFixedCost = () => {
                setFormData(prev => ({
                    ...prev,
                    fixedCosts: [...(prev.fixedCosts || []), { name: '', amount: 0 }]
                }));
            };

            const updateFixedCost = (idx, field, value) => {
                setFormData(prev => {
                    const updated = [...(prev.fixedCosts || [])];
                    updated[idx] = { ...updated[idx], [field]: value };
                    return { ...prev, fixedCosts: updated };
                });
            };

            const removeFixedCost = (idx) => {
                setFormData(prev => ({
                    ...prev,
                    fixedCosts: prev.fixedCosts.filter((_, i) => i !== idx)
                }));
            };

            const handleSave = () => {
                if (!formData.name.trim()) return showNotification('平台名稱不能為空', 'error');

                if (editingId) {
                    setPlatforms(prevPlatforms => {
                        const list = Array.isArray(prevPlatforms) ? prevPlatforms : [];
                        return list.map(p => p.id === editingId ? { ...formData, id: editingId } : p);
                    });
                    showNotification('平台資訊已更新');
                } else {
                    const newPlatform = { ...formData, id: generateId() };
                    setPlatforms(prevPlatforms => {
                        const list = Array.isArray(prevPlatforms) ? prevPlatforms : [];
                        return [...list, newPlatform];
                    });
                    showNotification('平台已新增');
                }
                resetForm();
            };

            const handleEdit = (platform) => {
                setFormData({
                    name: platform.name || '',
                    activityFeeRate: platform.activityFeeRate || 0,
                    paymentFeeRate: platform.paymentFeeRate || 2,
                    platformFeeRate: platform.platformFeeRate || 5,
                    packagingCost: platform.packagingCost || 0,
                    shippingCost: platform.shippingCost || 0,
                    notes: platform.notes || '',
                    additionalFees: Array.isArray(platform.additionalFees) ? platform.additionalFees : [],
                    fixedCosts: Array.isArray(platform.fixedCosts) ? platform.fixedCosts : []
                });
                setEditingId(platform.id);
            };

            const handleDelete = (id) => {
                if (!confirm('確定要刪除此平台嗎？')) return;
                setPlatforms(prevPlatforms => {
                    const list = Array.isArray(prevPlatforms) ? prevPlatforms : [];
                    return list.filter(p => p.id !== id);
                });
                showNotification('平台已刪除');

                                        <input type="number" step="0.1" className="w-full border p-2 rounded text-sm"
                                            value={formData.activityFeeRate} onChange={e => setFormData({...formData, activityFeeRate: Number(e.target.value)})} />

                                    </div>

                                            value={formData.paymentFeeRate} onChange={e => setFormData({...formData, paymentFeeRate: Number(e.target.value)})} />

                                    </div>

                                            value={formData.platformFeeRate} onChange={e => setFormData({...formData, platformFeeRate: Number(e.target.value)})} />
                                        <span className="text-xs text-gray-400">%</span>
                                    </div>
                                </div>

                                                step="0.1"

                                        </div>

                                    <div className="flex items-center gap-2">
                                        <span className="text-xs w-24 text-gray-600">運費</span>
                                        <input type="number" step="0.01" className="w-full border p-2 rounded text-sm"
                                            value={formData.shippingCost} onChange={e => setFormData({...formData, shippingCost: Number(e.target.value)})} />
                                    </div>

                                    {(formData.fixedCosts || []).length > 0 && (
                                        <div className="space-y-2 pt-2 border-t border-orange-100">
                                            {(formData.fixedCosts || []).map((cost, idx) => (
                                                <div key={idx} className="flex items-center gap-2">
                                                    <input
                                                        className="flex-1 border p-2 rounded text-sm"
                                                        placeholder="項目名稱"
                                                        value={cost.name}
                                                        onChange={e => updateFixedCost(idx, 'name', e.target.value)}
                                                    />
                                                    <input
                                                        type="number"
                                                        step="0.01"
                                                        className="w-28 border p-2 rounded text-sm"
                                                        value={cost.amount}
                                                        onChange={e => updateFixedCost(idx, 'amount', Number(e.target.value))}
                                                    />
                                                    <span className="text-xs text-gray-400">$</span>
                                                    <button type="button" onClick={() => removeFixedCost(idx)} className="text-red-500">x</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-1">備註</label>
                                <textarea className="w-full border border-gray-200 p-2.5 rounded-xl resize-none h-16 focus:ring-2 focus:ring-blue-100 outline-none"
                                    placeholder="例如：活動期間、特殊費用..." value={formData.notes}
                                    onChange={e => setFormData({...formData, notes: e.target.value})} />
                            </div>
                        </div>

                        <div className="flex gap-3">
                            <button onClick={resetForm} className="flex-1 px-4 py-2 border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 font-bold">
                                取消
                            </button>
                            <button onClick={handleSave} className="flex-1 px-4 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-600 shadow-lg shadow-blue-200 font-bold">
                                {editingId ? '更新' : '新增'}
                            </button>
                        </div>
                    </div>

                    {/* 平台模板清單區塊 */}
                    <div className="macaron-card p-6 flex flex-col flex-1">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-lg text-gray-700 flex items-center gap-2">
                                <i data-lucide="layers" className="text-purple-500"></i> 平台模板清單
                            </h3>
                            <span className="text-sm bg-purple-100 text-purple-600 px-3 py-1 rounded-full font-bold">
                                {safePlatforms.length} 個平台
                            </span>
                        </div>

                        {safePlatforms.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-16 text-gray-400">
                                <i data-lucide="inbox" className="w-16 h-16 mb-4 opacity-30"></i>
                                <p className="text-lg font-bold mb-2">尚無平台設定</p>
                                <p className="text-sm">左側新增第一個平台模板</p>
                            </div>
                        ) : (
                            <div className="space-y-3 overflow-auto flex-1">
                                {safePlatforms.map(platform => (
                                    <div key={platform.id} className="border border-gray-100 p-4 rounded-xl hover:border-purple-200 hover:bg-purple-50/30 transition">
                                        <div className="flex justify-between items-start mb-3">
                                            <div>
                                                <h4 className="font-bold text-gray-700 text-lg">{platform.name}</h4>
                                                {platform.notes && <p className="text-xs text-gray-400 mt-1">{platform.notes}</p>}
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => handleEdit(platform)} className="p-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200">
                                                    <i data-lucide="pencil" className="w-4 h-4"></i>
                                                </button>
                                                <button onClick={() => handleDelete(platform.id)} className="p-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200">
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>

                                        {(() => {
                                            const totalFeeRate = (
                                                Number(platform.activityFeeRate || 0) +
                                                Number(platform.paymentFeeRate || 0) +
                                                Number(platform.platformFeeRate || 0) +
                                                ((platform.additionalFees || []).reduce((sum, f) => sum + Number(f.rate || 0), 0))
                                            ).toFixed(1);

                                            const totalFixedCost = (
                                                Number(platform.packagingCost || 0) +
                                                Number(platform.shippingCost || 0) +
                                                ((platform.fixedCosts || []).reduce((sum, c) => sum + Number(c.amount || 0), 0))
                                            ).toFixed(2);

                                            return (
                                                <div className="grid grid-cols-5 gap-3 text-sm">
                                                    <div className="bg-white p-2 rounded border border-gray-50">
                                                        <div className="text-xs text-gray-400 font-bold">活動手續費</div>
                                                        <div className="text-lg font-bold text-blue-600">{platform.activityFeeRate}%</div>
                                                    </div>
                                                    <div className="bg-white p-2 rounded border border-gray-50">
                                                        <div className="text-xs text-gray-400 font-bold">金流手續費</div>
                                                        <div className="text-lg font-bold text-blue-600">{platform.paymentFeeRate}%</div>
                                                    </div>
                                                    <div className="bg-white p-2 rounded border border-gray-50">
                                                        <div className="text-xs text-gray-400 font-bold">平台費</div>
                                                        <div className="text-lg font-bold text-blue-600">{platform.platformFeeRate}%</div>
                                                    </div>
                                                    <div className="bg-white p-2 rounded border border-gray-50">
                                                        <div className="text-xs text-gray-400 font-bold">總手續費費率</div>
                                                        <div className="text-lg font-bold text-orange-600">{totalFeeRate}%</div>
                                                    </div>
                                                    <div className="bg-white p-2 rounded border border-gray-50">
                                                        <div className="text-xs text-gray-400 font-bold">固定成本</div>
                                                        <div className="text-lg font-bold text-green-600">${totalFixedCost}</div>
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const QuotationImportView = ({ quotations, setQuotations, quotationTransferHistory, setQuotationTransferHistory, onUseQuote, inventory, setInventory, priceHistory }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [importedQuotationNo, setImportedQuotationNo] = useState('');
            const [newQuotationNo, setNewQuotationNo] = useState('');
            const [newCustomer, setNewCustomer] = useState('');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);
            const [newStatus, setNewStatus] = useState('草稿');
            const [newRemark, setNewRemark] = useState('');
            const [newItemName, setNewItemName] = useState('');
            const [newItemSpec, setNewItemSpec] = useState('');
            const [newItemQty, setNewItemQty] = useState(1);
            const [newItemPrice, setNewItemPrice] = useState(0);
            const [newQuoteItems, setNewQuoteItems] = useState([]);
            const [itemSearchTerm, setItemSearchTerm] = useState('');

            const generateNewQuotationNo = () => {
                const dateCode = new Date().toISOString().split('T')[0].replace(/-/g, '');
                const existing = quotations
                    .map(q => q.quotationNo)
                    .filter(Boolean)
                    .filter(qNo => qNo.startsWith(`QT-${dateCode}`));
                let seq = 1;
                while (existing.includes(`QT-${dateCode}-${String(seq).padStart(3, '0')}`)) {
                    seq++;
                }
                return `QT-${dateCode}-${String(seq).padStart(3, '0')}`;
            };

            useEffect(() => {
                if (!newQuotationNo) {
                    setNewQuotationNo(generateNewQuotationNo());
                }
            }, [newQuotationNo, quotations]);

            const filtered = quotations.filter(q =>
                (q.quotationNo || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                (q.productName || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const sheetRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

                    // 支援新格式：A1-5 為標題欄，B1-5 為內容欄
                    const a1 = String((sheetRows[0] || [])[0] || '').trim();
                    const a2 = String((sheetRows[1] || [])[0] || '').trim();
                    const a3 = String((sheetRows[2] || [])[0] || '').trim();
                    const a4 = String((sheetRows[3] || [])[0] || '').trim();
                    const a5 = String((sheetRows[4] || [])[0] || '').trim();
                    const isMetaFormat = [a1, a2, a3, a4, a5].every((v, i) => {
                        const keys = ['報價單號', '客戶名稱', '日期', '狀態', '備註'];
                        return v.match(new RegExp(`^${keys[i]}$`, 'i'));
                    });

                    if (sheetRows.length >= 5 && !isMetaFormat && a1) {
                        alert('匯入失敗：此欄位請放在A1~A5');
                        e.target.value = null;
                        return;
                    }

                    let parsedMeta = {
                        quotationNo: '',
                        customerName: '',
                        date: '',
                        status: '',
                        remarkAll: ''
                    };

                    if (sheetRows.length >= 5 && Array.isArray(sheetRows[0]) && typeof sheetRows[0][0] !== 'undefined') {
                        // 一次讀 A1-A5 & B1-B5 傳統格式
                        const keyMap = (rowIndex) => {
                            const keyCell = String(sheetRows[rowIndex][0] || '').trim();
                            const valueCell = sheetRows[rowIndex][1] || '';
                            return { key: keyCell, value: valueCell };
                        };
                        const item1 = keyMap(0); // 報價單號
                        const item2 = keyMap(1); // 客戶名稱
                        const item3 = keyMap(2); // 日期
                        const item4 = keyMap(3); // 狀態
                        const item5 = keyMap(4); // 備註

                        if (item1.key.match(/報價單號|QuotationNo|quotationNo/i)) parsedMeta.quotationNo = item1.value;
                        if (item2.key.match(/客戶名稱|CustomerName|customerName/i)) parsedMeta.customerName = item2.value;
                        if (item3.key.match(/日期|Date/i)) parsedMeta.date = item3.value;
                        if (item4.key.match(/狀態|Status/i)) parsedMeta.status = item4.value;
                        if (item5.key.match(/備註|Remark/i)) parsedMeta.remarkAll = item5.value;
                    } else {
                        const metadataRow = sheetRows[0] || [];
                        parsedMeta = {
                            quotationNo: metadataRow[0] || '',
                            customerName: metadataRow[1] || '',
                            date: metadataRow[2] || '',
                            status: metadataRow[3] || '',
                            remarkAll: metadataRow[4] || ''
                        };
                    }

                    const findHeaderRow = () => {
                        return sheetRows.findIndex(row => {
                            if (!Array.isArray(row)) return false;
                            return row.some(cell => String(cell || '').trim().match(/^產品名稱$/i));
                        });
                    };

                    const dataStart = findHeaderRow();
                    let rows = [];

                    if (dataStart >= 0) {
                        const headerRow = sheetRows[dataStart];
                        const getCol = (keys) => {
                            for (const key of keys) {
                                const idx = headerRow.findIndex(h => String(h || '').trim().match(new RegExp(`^${key}$`, 'i')));
                                if (idx >= 0) return idx;
                            }
                            // fallback by contains
                            for (const key of keys) {
                                const idx = headerRow.findIndex(h => String(h || '').trim().toLowerCase().includes(key.toLowerCase()));
                                if (idx >= 0) return idx;
                            }
                            return -1;
                        };

                        const pnIdx = getCol(['產品名稱', 'ProductName', 'productName', '商品名稱']);
                        const specIdx = getCol(['規格', 'Spec', 'spec']);
                        const unitIdx = getCol(['單價(報價)', '單價', 'UnitPrice', 'price']);
                        const qtyIdx = getCol(['數量', 'Qty', 'quantity']);

                        rows = sheetRows.slice(dataStart + 1).reduce((acc, row) => {
                            if (!Array.isArray(row)) return acc;
                            const name = String(row[pnIdx] || '').trim();
                            if (!name) return acc;

                            const qty = Number(row[qtyIdx] || 0) || 0;
                            const unitPrice = Number(row[unitIdx] || 0) || 0;

                            acc.push({
                                id: generateId(),
                                quotationNo: parsedMeta.quotationNo || '',
                                customerName: parsedMeta.customerName || '',
                                quoteDate: parsedMeta.date || '',
                                quoteStatus: parsedMeta.status || '',
                                quoteRemark: parsedMeta.remarkAll || '',
                                productName: name,
                                spec: row[specIdx] || '',
                                qty,
                                unitPrice,
                                remark: parsedMeta.remarkAll || ''
                            });
                            return acc;
                        }, []);
                    }

                    if (rows.length === 0) {
                        // fallback to previous sheet_to_json row objects mode
                        const data = XLSX.utils.sheet_to_json(ws);
                        const resolveField = (row, keys) => {
                            if (!row || typeof row !== 'object') return undefined;
                            for (const key of keys) {
                                if (row[key] !== undefined) return row[key];
                            }
                            const normalized = Object.keys(row).reduce((acc, k) => {
                                acc[k.trim().replace(/\s+/g, '').toLowerCase()] = k;
                                return acc;
                            }, {});
                            for (const key of keys) {
                                const normalizedKey = key.trim().replace(/\s+/g, '').toLowerCase();
                                if (normalizedKey && normalized[normalizedKey]) {
                                    return row[normalized[normalizedKey]];
                                }
                            }
                            return undefined;
                        };

                        rows = data.map(row => {
                            const quotationNo = resolveField(row, ['報價單號', 'QuotationNo', 'quotationNo', '報價單編號']);
                            const productName = resolveField(row, ['產品名稱', 'ProductName', 'productName', '商品名稱']);
                            const spec = resolveField(row, ['規格', 'Spec', 'spec']);
                            const qty = Number(resolveField(row, ['數量', 'Qty', 'quantity', '數量(包)', '數量(件)']) || 0);
                            const unitPrice = Number(resolveField(row, ['單價(報價)', '單價', 'UnitPrice', 'price', '每單價']) || 0);
                            return {
                                id: generateId(),
                                quotationNo: quotationNo || parsedMeta.quotationNo || '',
                                customerName: parsedMeta.customerName || '',
                                quoteDate: parsedMeta.date || '',
                                quoteStatus: parsedMeta.status || '',
                                quoteRemark: parsedMeta.remarkAll || '',
                                productName: productName || '',
                                spec: spec || '',
                                qty: qty || 0,
                                unitPrice: unitPrice || 0,
                                remark: resolveField(row, ['備註', 'Remark', '備註說明']) || parsedMeta.remarkAll || ''
                            };
                        });
                    }

                    setQuotations(prev => [...prev, ...rows]);
                    setImportedQuotationNo(rows.length > 0 ? (rows[0].quotationNo || '') : '');
                    alert(`匯入 ${rows.length} 筆報價項目`);
                    e.target.value = null;
                };
                reader.readAsBinaryString(file);
            };

            const matchingInventoryItems = inventory.filter(item => item.name.toLowerCase().includes(itemSearchTerm.toLowerCase()));

            useEffect(() => {
                const exact = inventory.find(item => item.name.toLowerCase() === itemSearchTerm.toLowerCase());
                if (exact) {
                    setNewItemName(exact.name);
                    setNewItemSpec(exact.spec || '');
                    setNewItemPrice(exact.retailPrice || exact.avgCost || 0);
                }
            }, [itemSearchTerm, inventory]);

            const addNewQuoteItem = () => {
                if (!newItemName) return alert('請輸入產品名稱');
                if (!newItemQty || newItemQty <= 0) return alert('請輸入數量');

                setNewQuoteItems(prev => [...prev, {
                    id: generateId(),
                    quotationNo: newQuotationNo,
                    customerName: newCustomer,
                    quoteDate: newDate,
                    quoteStatus: newStatus,
                    quoteRemark: newRemark,
                    productName: newItemName,
                    spec: newItemSpec,
                    qty: Number(newItemQty),
                    unitPrice: Number(newItemPrice),
                    remark: newRemark
                }]);

                setNewItemName('');
                setNewItemSpec('');
                setNewItemQty(1);
                setNewItemPrice(0);
                setItemSearchTerm('');
            };

            const addFromPriceHistory = (record) => {
                if (!record || !record.product) return;
                setNewItemName(record.product);
                setNewItemPrice(record.price);
                setNewItemQty(1);
                setNewItemSpec('');
            };

            const createNewQuotation = () => {
                if (!newCustomer) return alert('請輸入客戶名稱');
                if (newQuoteItems.length === 0) return alert('請先加入至少一項產品');

                const newRows = newQuoteItems.map(item => ({
                    ...item,
                    quotationNo: newQuotationNo,
                    customerName: newCustomer,
                    quoteDate: newDate,
                    quoteStatus: newStatus,
                    quoteRemark: newRemark
                }));

                setQuotations(prev => [...prev, ...newRows]);

                // 若新產品不在庫存，新增庫存項目(預設庫存0)
                const nonExisting = newRows.filter(item => !inventory.some(i => i.name === item.productName && i.spec === item.spec));
                if (nonExisting.length > 0 && typeof setInventory === 'function') {
                    const additions = nonExisting.map(item => ({
                        id: generateId(),
                        name: item.productName,
                        spec: item.spec || '',
                        qty: 0,
                        avgCost: item.unitPrice || 0,
                        retailPrice: item.unitPrice || 0,
                        location: '未分類'
                    }));
                    setInventory(prev => {
                        const existing = prev || [];
                        const dedup = additions.filter(add => !existing.some(e => e.name === add.name && e.spec === add.spec));
                        return [...existing, ...dedup];
                    });
                }

                alert(`新增報價單：${newQuotationNo}（${newRows.length} 項）`);
                setNewQuotationNo(generateNewQuotationNo());
                setNewCustomer('');
                setNewDate(new Date().toISOString().split('T')[0]);
                setNewStatus('草稿');
                setNewRemark('');
                setNewQuoteItems([]);
            };

            const copyToOutbound = (quotationNo) => {
                const lines = quotations.filter(q => q.quotationNo === quotationNo);
                if (lines.length === 0) return alert('找不到此報價單資料');

                const sample = lines[0];
                onUseQuote(lines, quotationNo, {
                    customerName: sample.customerName || '',
                    remark: sample.quoteRemark || '',
                    date: sample.quoteDate || '',
                    status: sample.quoteStatus || ''
                });

                setQuotationTransferHistory(prev => [
                    {
                        id: generateId(),
                        quotationNo,
                        customerName: sample.customerName || '',
                        transferAt: new Date().toISOString(),
                        date: sample.quoteDate || '',
                        status: sample.quoteStatus || ''
                    },
                    ...prev
                ]);
            };

            const removeQuotation = (id) => {
                setQuotations(prev => prev.filter(q => q.id !== id));
            };

            const uniqueNumbers = [...new Set(quotations.map(q => q.quotationNo).filter(Boolean))];

            return (
                <div className="space-y-4">
                    <div className="macaron-card p-6">
                        <h3 className="font-bold text-lg text-gray-700 mb-3">匯入報價單資料 (CSV/XLSX)</h3>
                        <input type="file" accept=".xlsx,.xls,.csv" onChange={handleImportFile} className="block" />
                        <p className="text-xs text-gray-500 mt-2">請使用含「報價單號、產品名稱、規格、數量、單價」欄位的檔案。</p>
                    </div>

                    <div className="macaron-card p-6 border border-gray-200">
                        <h3 className="font-bold text-lg text-gray-700 mb-3">+ 新增報價單</h3>
                        <div className="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-1">報價單號</label>
                                <input value={newQuotationNo} readOnly className="w-full border border-gray-200 p-2 rounded-lg bg-gray-100 text-xs" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-1">客戶名稱</label>
                                <input value={newCustomer} onChange={e => setNewCustomer(e.target.value)} className="w-full border border-gray-200 p-2 rounded-lg text-xs" placeholder="客戶名稱" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-1">日期</label>
                                <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full border border-gray-200 p-2 rounded-lg text-xs" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 mb-1">狀態</label>
                                <input value={newStatus} onChange={e => setNewStatus(e.target.value)} className="w-full border border-gray-200 p-2 rounded-lg text-xs" placeholder="草稿" />
                            </div>
                            <div className="col-span-2">
                                <label className="block text-xs font-bold text-gray-400 mb-1">備註</label>
                                <input value={newRemark} onChange={e => setNewRemark(e.target.value)} className="w-full border border-gray-200 p-2 rounded-lg text-xs" placeholder="可留空" />
                            </div>
                        </div>

                        <h4 className="text-sm font-bold text-gray-600 mb-2">加入產品</h4>
                        <div className="grid grid-cols-3 gap-2 mb-2">
                            <div>
                                <label className="text-xs text-gray-400">搜尋現有產品</label>
                                <input
                                    list="quotationProductList"
                                    value={itemSearchTerm}
                                    onChange={e => setItemSearchTerm(e.target.value)}
                                    placeholder="輸入商品名稱..."
                                    className="w-full border border-gray-200 p-2 rounded-lg text-xs"
                                />
                                <datalist id="quotationProductList">
                                    {matchingInventoryItems.map(item => <option key={item.id} value={item.name} />)}
                                </datalist>
                            </div>
                            <div>
                                <label className="text-xs text-gray-400">品名</label>
                                <input value={newItemName} onChange={e => setNewItemName(e.target.value)} className="w-full border border-gray-200 p-2 rounded-lg text-xs" />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400">規格</label>
                                <input value={newItemSpec} onChange={e => setNewItemSpec(e.target.value)} className="w-full border border-gray-200 p-2 rounded-lg text-xs" />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400">數量</label>
                                <input type="number" min="1" value={newItemQty} onChange={e => setNewItemQty(Number(e.target.value))} className="w-full border border-gray-200 p-2 rounded-lg text-xs" />
                            </div>
                            <div>
                                <label className="text-xs text-gray-400">單價</label>
                                <input type="number" value={newItemPrice} onChange={e => setNewItemPrice(Number(e.target.value))} className="w-full border border-gray-200 p-2 rounded-lg text-xs" />
                            </div>
                            <div className="flex items-end">
                                <button onClick={addNewQuoteItem} className="w-full bg-blue-500 text-white text-xs py-2 rounded-lg">新增一項</button>
                            </div>
                        </div>

                        <div className="mb-2">
                            <div className="flex items-center justify-between mb-1">
                                <span className="text-xs font-bold text-gray-500">歷史試算紀錄</span>
                                <span className="text-xs text-gray-400">點擊可快速帶入</span>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {(priceHistory || []).slice(0, 10).map(rec => (
                                    <button key={rec.id} onClick={() => addFromPriceHistory(rec)} className="text-xs px-2 py-1 border border-gray-200 rounded-lg hover:bg-gray-100">{rec.product} / ${rec.price}</button>
                                ))}
                                {(priceHistory || []).length === 0 && <div className="text-xs text-gray-400">尚無試算紀錄</div>}
                            </div>
                        </div>

                        <div className="overflow-auto max-h-52 border border-gray-100 rounded-lg mb-3">
                            <table className="w-full text-xs text-left macaron-table">
                                <thead>
                                    <tr>
                                        <th className="p-2">品名</th>
                                        <th className="p-2">規格</th>
                                        <th className="p-2 text-right">數量</th>
                                        <th className="p-2 text-right">單價</th>
                                        <th className="p-2">動作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {newQuoteItems.length === 0 ? (
                                        <tr><td colSpan="5" className="p-3 text-center text-gray-400">尚無品項</td></tr>
                                    ) : newQuoteItems.map(item => (
                                        <tr key={item.id} className="border-t border-gray-100">
                                            <td className="p-2">{item.productName}</td>
                                            <td className="p-2">{item.spec}</td>
                                            <td className="p-2 text-right">{item.qty}</td>
                                            <td className="p-2 text-right">{item.unitPrice}</td>
                                            <td className="p-2"><button onClick={() => setNewQuoteItems(prev => prev.filter(i => i.id !== item.id))} className="text-red-500 text-xs">刪除</button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <button onClick={createNewQuotation} className="w-full bg-green-500 text-white py-2 rounded-lg text-sm">儲存報價單</button>
                    </div>

                    <div className="macaron-card p-6">
                        <div className="mb-3 flex gap-2">
                            <input
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                                placeholder="搜尋報價單號/產品"
                                className="flex-1 border border-gray-200 p-2 rounded-lg"
                            />
                            <button onClick={() => setSearchTerm('')} className="px-3 py-2 bg-gray-100 rounded-lg">清除</button>
                        </div>
                        <div className="overflow-auto max-h-80 border border-gray-100 rounded-xl">
                            <table className="w-full text-sm text-left macaron-table">
                                <thead>
                                    <tr>
                                        <th className="p-2">報價單號</th>
                                        <th className="p-2">產品名稱</th>
                                        <th className="p-2">規格</th>
                                        <th className="p-2 text-right">數量</th>
                                        <th className="p-2 text-right">單價</th>
                                        <th className="p-2">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.length === 0 ? (
                                        <tr><td colSpan="6" className="p-4 text-center text-gray-400">尚無報價單資料</td></tr>
                                    ) : filtered.map(q => (
                                        <tr key={q.id} className="border-t border-gray-100">
                                            <td className="p-2">{q.quotationNo}</td>
                                            <td className="p-2">{q.productName}</td>
                                            <td className="p-2">{q.spec}</td>
                                            <td className="p-2 text-right">{q.qty}</td>
                                            <td className="p-2 text-right">${q.unitPrice}</td>
                                            <td className="p-2">
                                                <button onClick={() => removeQuotation(q.id)} className="text-red-500 text-xs">移除</button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="macaron-card p-6">
                        <h4 className="font-bold mb-2">快速轉出貨單</h4>
                        {uniqueNumbers.length === 0 ? (
                            <p className="text-xs text-gray-400">請先匯入報價單後，選擇報價單號轉成出貨單。</p>
                        ) : (
                            <ul className="space-y-2">
                                {uniqueNumbers.map(qNo => {
                                    const sample = quotations.find(q => q.quotationNo === qNo);
                                    return (
                                        <li key={qNo} className="flex justify-between items-center gap-2 border border-gray-100 p-2 rounded-lg">
                                            <div className="text-xs">
                                                <div><span className="font-bold">{qNo}</span> | {sample?.customerName || '未指定客戶'}</div>
                                                <div className="text-gray-500">{sample?.quoteDate ? `日期: ${sample.quoteDate}` : ''} {sample?.quoteStatus ? `狀態: ${sample.quoteStatus}` : ''}</div>
                                            </div>
                                            <button onClick={() => copyToOutbound(qNo)} className="px-3 py-1.5 bg-blue-400 text-white rounded-lg text-xs">轉至出貨單</button>
                                        </li>
                                    );
                                })}
                            </ul>
                        )}
                    </div>

                    <div className="macaron-card p-6">
                        <h4 className="font-bold mb-2">匯入轉單歷史</h4>
                        <div className="overflow-auto max-h-52">
                            <table className="w-full text-xs text-left">
                                <thead>
                                    <tr>
                                        <th className="p-1">報價單號</th>
                                        <th className="p-1">客戶</th>
                                        <th className="p-1">轉單時間</th>
                                        <th className="p-1">來源日期</th>
                                        <th className="p-1">來源狀態</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {quotationTransferHistory.length === 0 ? (
                                        <tr><td colSpan="5" className="p-2 text-gray-400">尚無轉單紀錄</td></tr>
                                    ) : quotationTransferHistory.map(h => (
                                        <tr key={h.id} className="border-t border-gray-100">
                                            <td className="p-1">{h.quotationNo}</td>
                                            <td className="p-1">{h.customerName}</td>
                                            <td className="p-1">{new Date(h.transferAt).toLocaleString()}</td>
                                            <td className="p-1">{h.date}</td>
                                            <td className="p-1">{h.status}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const PriceCalculator = ({ inventory, priceHistory, setPriceHistory, showNotification, platforms = [] }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [currentProdName, setCurrentProdName] = useState('');
            const [platformName, setPlatformName] = useState('');
            const [cost, setCost] = useState(0);
            const [contentQty, setContentQty] = useState(1);
            const [profitMargin, setProfitMargin] = useState(30); 
            const [price, setPrice] = useState(0); 
            const [platformRate, setPlatformRate] = useState(5); 
            const [paymentRate, setPaymentRate] = useState(2); 
            const [otherRate, setOtherRate] = useState(0); 
            const [laborCost, setLaborCost] = useState(0); 
            const [shippingCost, setShippingCost] = useState(0); 

            const suggestedPrice30 = useMemo(() => {
                return Math.ceil(cost * 1.3);
            }, [cost]);

            const suggestedPrice50 = useMemo(() => {
                return Math.ceil(cost * 1.5);
            }, [cost]);

            const profit30 = useMemo(() => {
                return Math.round(suggestedPrice30 - cost);
            }, [suggestedPrice30, cost]);

            const profit50 = useMemo(() => {
                return Math.round(suggestedPrice50 - cost);
            }, [suggestedPrice50, cost]);

            const averageUnitPrice = useMemo(() => {
                const q = Number(contentQty) || 0;
                return q > 0 ? Number(cost) / q : 0;
            }, [cost, contentQty]);

            const calculations = useMemo(() => {
                const p = Number(price) || 0;
                const c = Number(cost) || 0;
                
                const platformFee = Math.round(p * (platformRate / 100));
                const paymentFee = Math.round(p * (paymentRate / 100));
                const otherFee = Math.round(p * (otherRate / 100));
                
                const totalDeductions = platformFee + paymentFee + otherFee + Number(laborCost) + Number(shippingCost);
                const netIncome = p - totalDeductions;
                const actualProfit = netIncome - c;
                const actualMargin = p > 0 ? (actualProfit / p) * 100 : 0;

                return {
                    platformFee,
                    paymentFee,
                    otherFee,
                    totalDeductions,
                    netIncome,
                    actualProfit,
                    actualMargin
                };
            }, [price, cost, platformRate, paymentRate, otherRate, laborCost, shippingCost]);

            const handleSelectProduct = (item) => {
                setSelectedProduct(item);
                setCurrentProdName(item.spec ? `${item.name} (${item.spec})` : item.name); 
                setCost(item.avgCost);
                setPrice(item.retailPrice || Math.ceil(item.avgCost * 1.3));
                setSearchTerm('');
            };

            const handleSaveRecord = () => {
                if (!currentProdName) return alert('請輸入產品名稱');
                if (!price) return alert('請輸入定價');
                
                const record = {
                    id: generateId(),
                    date: new Date().toISOString().split('T')[0],
                    platform: platformName || '通用/未指定',
                    product: currentProdName,
                    spec: selectedProduct?.spec || '',
                    cost: cost,
                    price: price,
                    profit: Math.round(calculations.actualProfit),
                    margin: calculations.actualMargin.toFixed(1),
                    note: `平台${platformRate}% | 金流${paymentRate}%`
                };
                // make sure priceHistory is array (might be null if corrupted storage)
                setPriceHistory([record, ...(priceHistory || [])]);
                showNotification('定價試算紀錄已儲存');
            };

            const handleDeleteRecord = (id) => {
                if(!confirm('確定刪除此紀錄？')) return;
                setPriceHistory(prev => prev.filter(r => r.id !== id));
            };

            const exportHistory = () => {
                const ws = XLSX.utils.json_to_sheet(priceHistory.map(r => ({
                    '日期': r.date,
                    '平台': r.platform,
                    '產品名稱': r.product,
                    '規格': r.spec || '',
                    '成本': r.cost,
                    '定價': r.price,
                    '預估淨利': r.profit,
                    '淨利率(%)': r.margin,
                    '備註': r.note
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "定價試算紀錄");
                XLSX.writeFile(wb, `-公司-_定價試算_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const searchResults = searchTerm ? inventory.filter(i => i.name.includes(searchTerm)) : [];

            return (
                <div className="flex flex-col h-full fade-in gap-6">
                    <div className="grid grid-cols-3 gap-6 flex-1">
                        <div className="col-span-2 space-y-6 overflow-auto">
                            <div className="macaron-card p-6">
                                <h3 className="font-bold text-gray-700 text-lg mb-4 flex items-center gap-2">
                                    <div className="bg-purple-100 p-2 rounded-full text-purple-500"><i data-lucide="package-search"></i></div>
                                    步驟 1: 設定產品與成本
                                </h3>
                                
                                <div className="mb-4 relative z-20">
                                    <label className="block text-xs font-bold text-gray-400 mb-1">快速帶入庫存 (選填)</label>
                                    <input 
                                        className="w-full border border-gray-200 p-2.5 rounded-xl focus:ring-2 focus:ring-purple-100 outline-none" 
                                        placeholder="搜尋庫存產品..." 
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                    />
                                    {searchResults.length > 0 && (
                                        <div className="absolute top-full left-0 w-full bg-white border border-gray-100 shadow-xl rounded-xl mt-1 max-h-48 overflow-auto">
                                            {searchResults.map(item => (
                                                <div key={item.id} onClick={() => handleSelectProduct(item)} className="p-3 hover:bg-purple-50 cursor-pointer text-sm flex justify-between">
                                                    <div>
                                                        <div className="font-medium">{item.name}</div>
                                                        {item.spec && <div className="text-xs text-gray-500">{item.spec}</div>}
                                                    </div>
                                                    <span className="text-gray-400">${Math.round(item.avgCost)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="mb-4">
                                    <label className="block text-xs font-bold text-gray-400 mb-1">產品名稱 (試算用)</label>
                                    <input 
                                        className="w-full border border-gray-200 p-2.5 rounded-xl font-bold text-gray-700 bg-gray-50 focus:bg-white transition" 
                                        placeholder="例如: M8不鏽鋼螺絲" 
                                        value={currentProdName}
                                        onChange={e => setCurrentProdName(e.target.value)}
                                    />
                                </div>

                                <div className="flex items-end gap-4">
                                    <div className="flex flex-col">
                                        <label className="block text-xs font-bold text-gray-400 mb-1">產品成本 ($)</label>
                                        <input type="number" className="w-40 border border-gray-200 p-2.5 rounded-xl bg-gray-50 font-bold text-gray-700" value={cost} onChange={e => setCost(Number(e.target.value))} />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="block text-xs font-bold text-gray-400 mb-1">內容數 (單位)</label>
                                        <input type="number" min="1" className="w-40 border border-gray-200 p-2.5 rounded-xl" value={contentQty} onChange={e => setContentQty(Number(e.target.value))} />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="block text-xs font-bold text-gray-400 mb-1">均價 ($/單位)</label>
                                        <input type="text" readOnly className="w-40 border border-gray-200 p-2.5 rounded-xl bg-gray-100 text-right text-gray-600" value={averageUnitPrice.toFixed(4)} />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="block text-xs font-bold text-gray-400 mb-1">預期利潤率 (%)</label>
                                        <input type="number" className="w-40 border border-gray-200 p-2.5 rounded-xl" value={profitMargin} onChange={e => setProfitMargin(Number(e.target.value))} />
                                    </div>
                                </div>
