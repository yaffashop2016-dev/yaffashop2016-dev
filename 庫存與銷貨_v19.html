<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧庫存系統v6.5</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SheetJS for Excel operations -->
    <script lang="javascript" src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Zen Maru Gothic', 'Microsoft JhengHei', sans-serif; 
            background-color: #fff0f5; 
            color: #5d5d5d;
        }
        
        /* Macaron UI Styles */
        .sidebar-item { transition: all 0.3s ease; border-radius: 9999px; margin-bottom: 0.5rem; }
        .sidebar-item:hover { background-color: #ffe4e6; color: #ec4899; transform: translateX(4px); }
        .sidebar-item.active { background-color: #fce7f3; color: #db2777; font-weight: 700; box-shadow: 0 2px 10px rgba(236, 72, 153, 0.15); }
        .macaron-card { background: white; border-radius: 1.5rem; border: 2px solid #fff5f7; box-shadow: 0 4px 20px rgba(255, 182, 193, 0.2); transition: all 0.3s ease; }
        .macaron-card:hover { border-color: #fbcfe8; }
        .btn-macaron { border-radius: 1rem; font-weight: 600; transition: all 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
        .btn-macaron:active { transform: translateY(2px); box-shadow: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #fff0f5; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background-color: rgba(255, 255, 255, 0.6); backdrop-filter: blur(4px); }
        .macaron-table thead tr { background-color: #fff1f2; color: #be185d; }
        .macaron-table th:first-child { border-top-left-radius: 1rem; border-bottom-left-radius: 1rem; }
        .macaron-table th:last-child { border-top-right-radius: 1rem; border-bottom-right-radius: 1rem; }
        .table-input { transition: all 0.2s; border: 1px solid transparent; }
        .table-input:focus { background-color: #fff; border-color: #fbcfe8; box-shadow: 0 0 0 2px rgba(251, 207, 232, 0.5); }
        .btn-delete { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-delete:hover { transform: scale(1.1); background-color: #fee2e2; }
        .btn-delete:active { transform: scale(0.95); }



        .receipt-preview-container {
            width: 90mm;
            height: 130mm;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto 1rem auto;
            padding: 5mm;
            display: flex;
            flex-direction: column;
            border: 1px dashed #ccc;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Utils & Constants ---
        const COMPANY_NAME = "智慧庫存管理"; 
        const COMPANY_SUB = "-公司名稱(可改)-";
        
        const generateId = () => '_' + Math.random().toString(36).substr(2, 9);
        const formatCurrency = (num) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(num || 0);

        // generate docNo in format PREFIX-民國年(3)+MM+DD+SEQ(3)
        const generateDocNoFor = (prefix, transactionsList=[]) => {
            const today = new Date();
            const mYear = today.getFullYear() - 1911; // 民國年
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const datePart = `${mYear}${mm}${dd}`;
            const countSame = (transactionsList || []).filter(t => t && t.type && (
                (prefix === 'OUT' && t.type === 'OUT') ||
                (prefix === 'PRE' && t.type === 'PREORDER') ||
                (prefix === 'IN' && t.type === 'IN') ||
                (prefix === 'RT' && (t.type === 'RETURN' || t.type === 'RT'))
            ) && t.docNo && t.docNo.startsWith(`${prefix}-${datePart}`)).length;
            const seq = String(countSame + 1).padStart(3, '0');
            return `${prefix}-${datePart}${seq}`;
        };

        // --- Helpers ---
        const safeParseJSON = (value, fallback = []) => {
            try {
                if (value === null || value === undefined) return fallback;
                const parsed = JSON.parse(value);
                return parsed === null ? fallback : parsed;
            } catch {
                return fallback;
            }
        };

        const loadStorage = (key, fallback = []) => {
            return safeParseJSON(localStorage.getItem(key), fallback);
        };

        const saveStorage = (key, data) => {
            try {
                localStorage.setItem(key, JSON.stringify(data ?? []));
            } catch (e) {
                console.warn('localStorage write failed', key, e);
            }
        };

const getQty = (item) => Number(item?.returnQty ?? item?.cartQty ?? item?.inboundQty ?? item?.qty ?? 0);
const getPrice = (item) => Number(item?.returnPrice ?? item?.cartPrice ?? item?.price ?? item?.inboundCost ?? 0);

        const deepClone = (obj) => {
            if (typeof structuredClone === 'function') return structuredClone(obj);
            return JSON.parse(JSON.stringify(obj));
        };

        // 統一的庫存更新函式
        // operation: 'add' (進貨), 'subtract' (出貨/退貨)
        // items: [{ productId, name, spec, qty, price?, batchNo?, expDate?, ... }]
        const updateInventoryStock = (inventory, items, operation, options = {}) => {
            const updatedInventory = deepClone(inventory);
            
            items.forEach(item => {
                const qty = getQty(item);
                const price = getPrice(item);
                
                // 找到現有項目或準備新增
                let existingIdx = -1;
                const hasPersistentId = item.productId && !item.productId.startsWith('TEMP_') && !item.productId.startsWith('NEW_');

                // 優先用 productId 匹配，否則用 name+spec
                if (hasPersistentId) {
                    existingIdx = updatedInventory.findIndex(i => i.id === item.productId);
                } else {
                    existingIdx = updatedInventory.findIndex(i => i.name === item.name && i.spec === item.spec);
                }
                
                if (operation === 'add') {
                    // 進貨：增加庫存，更新平均成本
                    if (existingIdx >= 0) {
                        const existing = updatedInventory[existingIdx];
                        const oldTotalVal = existing.qty * existing.avgCost;
                        const newTotalVal = oldTotalVal + (qty * price);
                        const newTotalQty = existing.qty + qty;
                        
                        // 更新到期日（取最早的）
                        let nextExp = existing.chemExpDate;
                        if (item.expDate) {
                            if (!nextExp || new Date(item.expDate) < new Date(nextExp)) {
                                nextExp = item.expDate;
                            }
                        }
                        
                        updatedInventory[existingIdx] = {
                            ...existing,
                            qty: newTotalQty,
                            avgCost: newTotalQty > 0 ? newTotalVal / newTotalQty : existing.avgCost,
                            chemExpDate: nextExp
                        };
                    } else {
                        // 新增項目
                        updatedInventory.push({
                            id: hasPersistentId ? item.productId : generateId(),
                            name: item.name,
                            spec: item.spec || '',
                            qty: qty,
                            avgCost: price,
                            retailPrice: item.retailPrice || price * 1.2, // 預設零售價為成本的1.2倍
                            supplier: options.supplier || '',
                            location: '未分類',
                            chemExpDate: item.expDate || ''
                        });
                    }
                } else if (operation === 'subtract') {
                    // 出貨/退貨：減少庫存
                    if (existingIdx >= 0) {
                        const existing = updatedInventory[existingIdx];
                        const newQty = Math.max(0, existing.qty - qty);
                        updatedInventory[existingIdx] = {
                            ...existing,
                            qty: newQty
                        };
                    } else {
                        console.warn(`嘗試減少不存在的項目: ${item.name} ${item.spec}`);
                    }
                }
            });
            
            return updatedInventory;
        };

        // --- Main App Component ---
        const App = () => {
            const [view, setView] = useState('dashboard');
            const [inventory, setInventory] = useState([]);
            const [orders, setOrders] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [priceHistory, setPriceHistory] = useState([]);
            const [platforms, setPlatforms] = useState([]);
            const [quotations, setQuotations] = useState([]);
            const [outboundPreset, setOutboundPreset] = useState(null);
            const [quotationTransferHistory, setQuotationTransferHistory] = useState([]);
            const [notification, setNotification] = useState(null);

            const [companyName, setCompanyName] = useState(localStorage.getItem('ah_company_name') || COMPANY_NAME);
            const [companySub, setCompanySub] = useState(localStorage.getItem('ah_company_sub') || COMPANY_SUB);

            useEffect(() => {
                localStorage.setItem('ah_company_name', companyName);
            }, [companyName]);

            useEffect(() => {
                localStorage.setItem('ah_company_sub', companySub);
            }, [companySub]);

            // --- DATA MIGRATION & SYNC CORE ---
            useEffect(() => {
                // 1) 安全讀取 localStorage
                const parsedInv = Array.isArray(loadStorage('ah_inventory', [])) ? loadStorage('ah_inventory', []) : [];
                const parsedOrders = Array.isArray(loadStorage('ah_orders', [])) ? loadStorage('ah_orders', []) : [];
                const parsedTransactions = Array.isArray(loadStorage('ah_transactions', [])) ? loadStorage('ah_transactions', []) : [];
                const parsedSuppliers = Array.isArray(loadStorage('ah_suppliers', [])) ? loadStorage('ah_suppliers', []) : [];
                const parsedPriceHist = Array.isArray(loadStorage('ah_price_history', [])) ? loadStorage('ah_price_history', []) : [];
                const parsedPlatforms = Array.isArray(loadStorage('ah_platforms', [])) ? loadStorage('ah_platforms', []) : [];
                const parsedQuotations = loadStorage('ah_quotations', []);
                const parsedTransferHistory = loadStorage('ah_quotation_transfer_history', []);

                try {
                    // --- MIGRATION STEP 1: Supplier Sync ---
                    const existingNames = new Set(parsedSuppliers.map(s => s.name));
                    let newSyncedCount = 0;

                    parsedTransactions.forEach(t => {
                        if ((t.type === 'IN' || t.type === 'RETURN') && t.partner && !existingNames.has(t.partner)) {
                            parsedSuppliers.push({
                                id: generateId(),
                                name: t.partner,
                                contact: '歷史同步',
                                phone: ''
                            });
                            existingNames.add(t.partner);
                            newSyncedCount++;
                        }
                    });

                    // --- MIGRATION STEP 2: ID Re-linking ---
                    let repairedTxCount = 0;
                    const invMap = new Map();
                    parsedInv.forEach(item => {
                        const key = `${item.name?.trim()}_${item.spec?.trim()}`;
                        invMap.set(key, item.id);
                    });

                    const updatedTransactions = parsedTransactions.map(tx => {
                        let txModified = false;
                        const newItems = (tx.items || []).map(item => {
                            let itemModified = false;
                            let newItem = { ...item };

                            // 2a. ID Repair
                            const exists = parsedInv.some(i => i.id === newItem.productId);
                            if (!exists) {
                                const key = `${newItem.name?.trim()}_${newItem.spec?.trim()}`;
                                const foundId = invMap.get(key);
                                if (foundId) {
                                    newItem.productId = foundId;
                                    itemModified = true;
                                }
                            }

                            // 2b. Batch Retrofit
                            if (tx.type === 'IN' && !newItem.batchNo) {
                                const dateStr = tx.date?.replace(/-/g, '') || '';
                                newItem.batchNo = `AUTO-${dateStr}`;
                                newItem.mfgDate = tx.date;
                                newItem.expDate = '';
                                itemModified = true;
                            }

                            if (itemModified) txModified = true;
                            return newItem;
                        });

                        if (txModified) {
                            repairedTxCount++;
                            return { ...tx, items: newItems };
                        }
                        return tx;
                    });

                    setInventory(parsedInv);
                    setOrders(parsedOrders);
                    setTransactions(updatedTransactions);
                    setSuppliers(parsedSuppliers);
                    setPriceHistory(Array.isArray(parsedPriceHist) ? parsedPriceHist : []);
                    setPlatforms(Array.isArray(parsedPlatforms) ? parsedPlatforms : []);
                    setQuotations(Array.isArray(parsedQuotations) ? parsedQuotations : (parsedQuotations ? [parsedQuotations] : []));
                    setQuotationTransferHistory(Array.isArray(parsedTransferHistory) ? parsedTransferHistory : (parsedTransferHistory ? [parsedTransferHistory] : []));

                    if (newSyncedCount > 0 || repairedTxCount > 0) {
                        setTimeout(() => showNotification(`系統已優化：同步 ${newSyncedCount} 供應商, 修復/升級 ${repairedTxCount} 筆交易紀錄`), 500);
                    }
                } catch (e) {
                    console.error("Data load error", e);
                    showNotification("讀取歷史資料時發生錯誤，部分資料可能已重置", "error");
                }
            }, []);

            useEffect(() => {
                saveStorage('ah_inventory', inventory);
                saveStorage('ah_orders', orders);
                saveStorage('ah_transactions', transactions);
                saveStorage('ah_suppliers', suppliers);
                saveStorage('ah_price_history', priceHistory);
                saveStorage('ah_platforms', platforms);
                saveStorage('ah_quotations', quotations);
                saveStorage('ah_quotation_transfer_history', quotationTransferHistory);
            }, [inventory, orders, transactions, suppliers, priceHistory, platforms, quotations, quotationTransferHistory]);

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const handlePrintPreview = (transaction) => {
                // 直接匯出單筆交易記錄到XLSX
                const exportTransactionToXLSX = (tx) => {
                    const transactionData = [{
                        '單號': tx.docNo || '',
                        '日期': tx.date || '',
                        '類型': tx.type || '',
                        '對象': tx.partner || '',
                        '總金額': tx.total || tx.subtotal || 0,
                        '稅額': tx.tax || 0,
                        '備註': tx.note || '',
                        '表頭': tx.header || '',
                        '表尾': tx.footer || ''
                    }];

                    const itemsData = (tx.items || []).map((item, index) => {
                        const qty = item.cartQty ?? item.returnQty ?? item.inboundQty ?? item.qty ?? 0;
                        const price = item.cartPrice ?? item.returnPrice ?? item.inboundCost ?? item.price ?? 0;
                        return {
                            '項次': index + 1,
                            '品名': item.name || '',
                            '規格': item.spec || '',
                            '數量': qty,
                            '單價': price,
                            '小計': qty * price,
                            '批號': item.batchNo || '',
                            '製造日期': item.mfgDate || '',
                            '到期日期': item.expDate || ''
                        };
                    });

                    // 創建工作簿
                    const wb = XLSX.utils.book_new();

                    // 添加交易摘要表
                    const wsSummary = XLSX.utils.json_to_sheet(transactionData);
                    XLSX.utils.book_append_sheet(wb, wsSummary, "交易摘要");

                    // 添加品項明細表
                    const wsItems = XLSX.utils.json_to_sheet(itemsData);
                    XLSX.utils.book_append_sheet(wb, wsItems, "品項明細");

                    // 匯出檔案
                    const fileName = `${tx.type || '交易'}_${tx.docNo || '未編號'}_${new Date().toISOString().split('T')[0]}.xlsx`;
                    XLSX.writeFile(wb, fileName);

                    showNotification(`已匯出 ${fileName}`);
                };

                exportTransactionToXLSX(transaction);
            };

            const handleImportCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const data = XLSX.utils.sheet_to_json(ws);
                    
                    const newOrders = data
                        .filter(row => row['訂單編號'] && row['產品名稱']) 
                        .map((row, idx) => ({
                            // 使用每列唯一 id，避免同一訂單編號的多列被視為同一筆
                            id: row['訂單編號'] ? `${row['訂單編號']}_${idx}` : generateId(),
                            // 保留原始訂單編號以供顯示與追蹤
                            orderNo: row['訂單編號'] || '',
                            quotationNo: row['報價單號'] || '',
                            supplier: row['供應商名稱'] || '未知供應商',
                            productName: row['產品名稱'] || '未命名產品',
                            spec: row['規格'] || '',
                            qty: Number(row['數量']) || 0,
                            unitCost: Number(row['成交單價']) || 0,
                            // 新增：成交運費欄位，支援欄位名稱「成交運費」或「運費」
                            shipping: Number(row['成交運費'] || row['運費'] || 0) || 0,
                            taxType: row['稅別'] || '不含稅',
                            date: row['下單日期'] || new Date().toISOString().split('T')[0],
                            status: 'imported_raw' 
                        }));

                    if (newOrders.length === 0) {
                        showNotification('匯入失敗：未找到有效資料，請檢查欄位名稱', 'error');
                        return;
                    }

                    setSuppliers(prev => {
                        const uniqueSuppliers = [...new Set(newOrders.map(o => o.supplier))].filter(Boolean);
                        const existingNames = new Set(prev.map(s => s.name));
                        const newSupplierObjs = uniqueSuppliers
                            .filter(name => !existingNames.has(name))
                            .map(name => ({
                                id: generateId(),
                                name: name,
                                contact: '',
                                phone: ''
                            }));
                        return [...prev, ...newSupplierObjs];
                    });

                    setOrders(prev => {
                        const history = prev.filter(o => o.status !== 'imported_raw');
                        return [...history, ...newOrders];
                    });
                    
                    showNotification(`成功匯入 ${newOrders.length} 筆資料`);
                    e.target.value = null; 
                };
                reader.readAsBinaryString(file);
            };

            const confirmStockIn = (selectedOrders) => {
                if(selectedOrders.length === 0) return;

                // --- 2025-02-18 v5.8.2 UPDATE: Supplier Name Logic ---
                // Detect if all selected orders come from the same supplier or mixed
                const uniqueSuppliers = [...new Set(selectedOrders.map(o => o.supplier).filter(s => s && s.trim() !== ''))];
                let txPartnerName = '批量匯入';
                
                if (uniqueSuppliers.length === 1) {
                    txPartnerName = uniqueSuppliers[0];
                } else if (uniqueSuppliers.length > 1) {
                    txPartnerName = '批量匯入 (混和廠商)';
                }
                // -----------------------------------------------------

                let updatedInventory = JSON.parse(JSON.stringify(inventory));
                const transactionItems = [];

                selectedOrders.forEach(order => {
                    const existingIdx = updatedInventory.findIndex(i => i.name === order.productName && i.spec === order.spec);
                    let targetId;

                    // 計算運費分配到每個單位的成本（運費 / 數量）
                    const shippingPerUnit = order.qty > 0 ? (Number(order.shipping) || 0) / order.qty : 0;
                    const orderItemCost = order.unitCost + shippingPerUnit; // 單位成本 + 分配運費

                    if (existingIdx >= 0) {
                        const item = updatedInventory[existingIdx];
                        targetId = item.id;
                        // 計算新的平均成本：加入運費分配後的訂購成本
                        const totalValue = (item.qty * item.avgCost) + (order.qty * orderItemCost);
                        const totalQty = item.qty + order.qty;
                        updatedInventory[existingIdx] = {
                            ...item,
                            qty: totalQty,
                            avgCost: totalQty > 0 ? totalValue / totalQty : 0
                        };
                    } else {
                        targetId = generateId();
                        updatedInventory.push({
                            id: targetId,
                            name: order.productName,
                            spec: order.spec,
                            qty: order.qty,
                            avgCost: orderItemCost,  // 新品項的平均成本已包含運費分配
                            retailPrice: 0,
                            supplier: order.supplier,
                            location: '未分類'
                        });
                    }

                    transactionItems.push({
                        productId: targetId,
                        name: order.productName,
                        spec: order.spec,
                        qty: order.qty,
                        price: order.unitCost,
                        batchNo: `IMP-${new Date().toISOString().split('T')[0].replace(/-/g,'')}`,
                        mfgDate: new Date().toISOString().split('T')[0],
                        expDate: ''
                    });
                });

                // 計算項目小計與運費總和，並記錄稅別資訊
                const itemsSum = selectedOrders.reduce((sum, o) => sum + (o.qty * o.unitCost), 0);
                const shippingTotal = selectedOrders.reduce((s, o) => s + (Number(o.shipping) || 0), 0);
                const txTaxType = (new Set(selectedOrders.map(o => o.taxType))).size === 1 ? selectedOrders[0].taxType : 'mixed';

                const newTx = {
                    id: generateId(),
                    type: 'IN',
                    date: new Date().toISOString().split('T')[0],
                    docNo: generateDocNoFor('IN', transactions),
                    partner: txPartnerName,
                    items: transactionItems,
                    subtotal: itemsSum,
                    shipping: shippingTotal,
                    taxType: txTaxType,
                    total: itemsSum + shippingTotal,
                    note: '從歷史訂單匯入'
                };

                setInventory(updatedInventory);
                setTransactions(prev => [newTx, ...prev]);
                setOrders(prevOrders => 
                    prevOrders.map(o => selectedOrders.find(so => so.id === o.id) ? { ...o, status: 'stocked' } : o)
                );
                showNotification(`成功將 ${selectedOrders.length} 筆項目轉入庫存`);
            };

            const fullBackup = () => {
                const data = { inventory, orders, transactions, suppliers, priceHistory, platforms };
                const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `智慧庫存管理資料備份_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const restoreBackup = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        if(confirm('確定要還原備份嗎？目前的資料將被覆蓋。')) {
                            setInventory(data.inventory || []);
                            setOrders(data.orders || []);
                            setTransactions(data.transactions || []);
                            setSuppliers(data.suppliers || []);

            const totalPreorderQty = preorderTxs.reduce((acc, tx) => acc + (tx.items?.reduce((s, item) => s + (item.cartQty ?? item.qty ?? 0), 0) || 0), 0);
            const pendingOrderQty = preorderTxs.reduce((acc, tx) => {
                const shortage = (tx.items || []).reduce((s, item) => {
                    const invItem = inventory.find(i => i.id === item.productId || (i.name === item.name && i.spec === item.spec));
                    const available = invItem ? invItem.qty : 0;
                    const needed = (item.cartQty ?? item.qty ?? 0) - available;
                    return s + (needed > 0 ? needed : 0);

        // --- UPGRADED CHEMICAL VIEW WITH MANUAL ENTRY & TRACE LINKING (v5.8.1) ---
        const ChemicalView = ({ inventory, setInventory, transactions, setTransactions, showNotification, onPreview }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [isAdding, setIsAdding] = useState(false);
            const [selectedChem, setSelectedChem] = useState(null);
            
            // Manual Trace Modal State
            const [showTraceModal, setShowTraceModal] = useState(false);
            const [manualTraceData, setManualTraceData] = useState({
                id: null, // If present, it's an EDIT
                type: 'IN',
                date: new Date().toISOString().split('T')[0],
                partner: '',
                batchNo: '',
                qty: 1,
                updateStock: false, // Default false based on user requirement
                note: '補登紀錄'
            });

            // Search existing inventory
            const nonChemItems = inventory.filter(i => !i.isChemical && (i.name.includes(searchTerm) || (i.spec || '').includes(searchTerm)));
            const chemItems = inventory.filter(i => i.isChemical);

            const getStatus = (item) => {
                let expiry = null;
                if (item.chemExpDate) expiry = new Date(item.chemExpDate);
                if (!expiry) return { label: '查看批號', color: 'bg-gray-100 text-gray-400' };

                const today = new Date();
                today.setHours(0,0,0,0);
                const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));

                if (diffDays < 0) return { label: '已過期', color: 'bg-red-100 text-red-600' };
                if (diffDays <= 30) return { label: `剩 ${diffDays} 天`, color: 'bg-orange-100 text-orange-600' };
                return { label: '正常', color: 'bg-green-100 text-green-600' };
            };

            const handleAddChemical = (item) => {
                const updated = inventory.map(i => i.id === item.id ? { 
                    ...i, isChemical: true, chemExpDate: '', chemReminderDate: '' 
                } : i);
                setInventory(updated);
                setIsAdding(false);
                setSearchTerm('');
                showNotification(`已將 ${item.name} 納入化學品管理`);
            };

            const handleUpdateChem = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const updated = inventory.map(i => i.id === selectedChem.id ? {
                    ...i,
                    chemExpDate: fd.get('chemExpDate'),
                    chemReminderDate: fd.get('chemReminderDate'),
                    chemNote: fd.get('chemNote')
                } : i);
                setInventory(updated);
                setSelectedChem(null);
                showNotification('化學品資料已更新');
            };

            const removeChemicalStatus = (id) => {
                if(!confirm("確定要取消此產品的化學品列管狀態嗎？")) return;
                setInventory(prev => prev.map(i => i.id === id ? { ...i, isChemical: false } : i));
                setSelectedChem(null);
            };

            // Enhanced History Trace
            const history = useMemo(() => {
                if (!selectedChem) return [];

                return transactions
                    .filter(t =>
                        t.items.some(ti => {
                            if (ti.productId === selectedChem.id) return true;
                            // Fallback logic
                            const n1 = (ti.name || '').trim().toLowerCase();
                            const n2 = (selectedChem.name || '').trim().toLowerCase();
                            const s1 = (ti.spec || '').trim().toLowerCase();
                            const s2 = (selectedChem.spec || '').trim().toLowerCase();
                            return n1 === n2 && s1 === s2;
                        })
                    )
                    .map(t => {
                        const item = t.items.find(ti => {
                            if (ti.productId === selectedChem.id) return true;
                            const n1 = (ti.name || '').trim().toLowerCase();
                            const n2 = (selectedChem.name || '').trim().toLowerCase();
                            const s1 = (ti.spec || '').trim().toLowerCase();
                            const s2 = (selectedChem.spec || '').trim().toLowerCase();
                            return n1 === n2 && s1 === s2;
                        });
                        return { ...t, batchInfo: item };
                    })
                    .sort((a,b)=> new Date(b.date) - new Date(a.date));
            }, [selectedChem, transactions]);

            const submitManualTrace = (e) => {
                e.preventDefault();
                if(!selectedChem) return;

                const qty = Number(manualTraceData.qty);
                if(qty <= 0) return alert('數量必須大於 0');

                // Case 1: Updating an existing manual log
                if (manualTraceData.id) {
                    const updatedTransactions = transactions.map(t => {
                        if (t.id === manualTraceData.id) {

                                ...t,
                                type: manualTraceData.type,
                                date: manualTraceData.date,
                                partner: manualTraceData.partner,
                                note: manualTraceData.note,
                                items: t.items.map(i => ({...i, batchNo: manualTraceData.batchNo, qty: qty}))
                            };
                        }
                        return t;
                    });
                    
                    // Logic check: User explicitly said edits/manual logs shouldn't affect inventory by default
                    if (manualTraceData.updateStock) {
                        alert("注意：修改模式下目前不支援再次觸發庫存增減，僅更新單據內容。如需調整庫存，請使用盤點功能。");

                            if(i.id === selectedChem.id) {

                        note: manualTraceData.note,

                    showNotification(`已新增紀錄${manualTraceData.updateStock ? '(含庫存調整)' : '(僅紀錄，無庫存變動)'}`);

            const resetManualForm = () => {

            return (
                <div className="grid grid-cols-3 gap-6 h-full fade-in">
                    <div className="col-span-2 macaron-card p-6 flex flex-col h-full">
                         <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold text-gray-700 text-lg flex items-center gap-2">

                            </h3>
                            <button onClick={() => setIsAdding(true)} className="bg-teal-500 text-white px-4 py-2 rounded-xl font-bold hover:bg-teal-600 shadow-lg shadow-teal-200 flex items-center gap-2">
                                <i data-lucide="plus"></i> 納入列管

                        </div>
                        <p className="text-xs text-gray-500 mb-4 italic">操作說明：此頁專為化學品管理，可查看效期、追蹤批號與手動補登記錄。</p>
                        
                        <div className="overflow-auto flex-1 rounded-xl border border-gray-100">
                             <table className="w-full text-sm text-left macaron-table">

                                <tbody>
                                    {chemItems.map(item => {

                                        return (
                                            <tr key={item.id} className="border-b border-gray-50 hover:bg-teal-50/30 transition">
                                                <td className="p-3 font-bold text-gray-700">{item.name}<div className="text-xs text-gray-400 font-normal">{item.spec}</div></td>

                    <div className="col-span-1 flex flex-col gap-6">

                        {selectedChem && (

                                    <div className="flex justify-between items-center mb-2">

                                        <button onClick={() => { resetManualForm(); setShowTraceModal(true); }} className="text-[10px] bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200 border border-gray-200">

                                        {history.map(t => (
                                            <div key={t.id} className={`bg-white p-2 rounded-lg border-l-4 text-xs shadow-sm ${
                                                t.type === 'IN' ? 'border-green-400' : 
                                                t.type === 'OUT' ? 'border-orange-400' : 
                                                'border-red-400'

                                                        t.type === 'IN' ? 'text-green-600' : 
                                                        t.type === 'OUT' ? 'text-orange-500' : 
                                                        'text-red-500'
                                                    }>
                                                        {t.type === 'IN' ? '⬇ 進貨' : t.type === 'OUT' ? '⬆ 出貨' : '⬅ 退貨'}
                                                    </span>
                                                    <span className="text-gray-400">{t.date}</span>
                                                </div>
                                                <div className="grid grid-cols-2 gap-1 mb-1">
                                                    <div className="text-gray-500">批號: <span className="font-mono text-black font-bold bg-yellow-50 px-1">{t.batchInfo.batchNo || '無'}</span></div>
                                                    <div className="text-right font-bold">數量: {t.batchInfo.qty}</div>
                                                </div>
                                                
                                                <div className="flex justify-between items-center mt-2">
                                                    <div className="flex-1">
                                                        <button 
                                                            onClick={() => onPreview(t)} 
                                                            className="text-[10px] text-blue-500 hover:text-blue-700 hover:underline text-left flex items-center gap-1"
                                                            title="匯出XLSX"
                                                        >
                                                            <i data-lucide="file-text" className="w-3 h-3"></i> {t.partner} | {t.docNo}
                                                        </button>
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => handleEditLog(t)} className="p-1 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded" title="修改補登資料">
                                                            <i data-lucide="pencil" className="w-3 h-3"></i>
                                                        </button>
                                                        <button onClick={() => handleDeleteLog(t.id)} className="p-1 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded" title="刪除紀錄 (不扣庫存)">
                                                            <i data-lucide="trash" className="w-3 h-3"></i>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        {history.length === 0 && <div className="text-center text-gray-400 py-4 text-xs">尚無相關進出貨紀錄</div>}
                                    </div>
                                </div>
                                <button onClick={() => removeChemicalStatus(selectedChem.id)} className="mt-4 text-xs text-red-400 hover:text-red-600 underline text-center w-full">取消化學品列管</button>
                            </div>
                        )}

                        {/* Manual Trace Modal */}
                        {showTraceModal && selectedChem && (
                            <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
                                <form onSubmit={submitManualTrace} className="bg-white p-6 rounded-3xl shadow-2xl w-80 fade-in border-4 border-gray-100">
                                    <h3 className="font-bold text-lg text-gray-700 mb-4 flex items-center gap-2">
                                        <i data-lucide="clipboard-list"></i> 
                                        {manualTraceData.id ? '修改補登紀錄' : '手動補登紀錄'}
                                    </h3>
                                    
                                    <div className="space-y-3 mb-4">
                                        <div className="flex gap-2">
                                            <select className="flex-1 p-2 border rounded-xl bg-gray-50" value={manualTraceData.type} onChange={e => setManualTraceData({...manualTraceData, type: e.target.value})}>
                                                <option value="IN">進貨 (IN)</option>
                                                <option value="OUT">出貨 (OUT)</option>
                                            </select>
                                            <input type="date" className="flex-1 p-2 border rounded-xl bg-gray-50" value={manualTraceData.date} onChange={e => setManualTraceData({...manualTraceData, date: e.target.value})} />
                                        </div>
                                        <input className="w-full p-2 border rounded-xl" placeholder="對象 (供應商/客戶)" value={manualTraceData.partner} onChange={e => setManualTraceData({...manualTraceData, partner: e.target.value})} required />
                                        <div className="flex gap-2">
                                            <input className="w-2/3 p-2 border rounded-xl" placeholder="批號 (選填)" value={manualTraceData.batchNo} onChange={e => setManualTraceData({...manualTraceData, batchNo: e.target.value})} />
                                            <input type="number" className="w-1/3 p-2 border rounded-xl font-bold text-center" placeholder="數量" min="1" value={manualTraceData.qty} onChange={e => setManualTraceData({...manualTraceData, qty: e.target.value})} required />
                                        </div>
                                        <input className="w-full p-2 border rounded-xl text-sm" placeholder="備註 (如: 歷史單據補登)" value={manualTraceData.note} onChange={e => setManualTraceData({...manualTraceData, note: e.target.value})} />
                                        
                                        {!manualTraceData.id && (
                                            <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                                <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                                                    <input type="checkbox" className="w-4 h-4 accent-gray-500" checked={manualTraceData.updateStock} onChange={e => setManualTraceData({...manualTraceData, updateStock: e.target.checked})} />
                                                    <span className="font-bold text-gray-500">同時調整庫存數量?</span>
                                                </label>
                                                <p className="text-[10px] text-gray-400 mt-1 pl-6">
                                                    預設為不勾選 (僅補文件)。<br/>
                                                    若勾選，將會直接異動現有庫存。
                                                </p>
                                            </div>
                                        )}
                                        {manualTraceData.id && (
                                            <div className="text-[10px] text-blue-500 bg-blue-50 p-2 rounded-lg">
                                                <i data-lucide="info" className="w-3 h-3 inline mr-1"></i>
                                                修改模式：僅更新單據文字內容，不會再次觸發庫存增減。
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex justify-end gap-3">
                                        <button type="button" onClick={() => setShowTraceModal(false)} className="px-4 py-2 text-gray-400 hover:bg-gray-50 rounded-xl">取消</button>
                                        <button type="submit" className="px-4 py-2 bg-gray-600 text-white rounded-xl hover:bg-gray-700 font-bold">
                                            {manualTraceData.id ? '儲存變更' : '確認補登'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const InboundView = ({ inventory, setInventory, transactions, setTransactions, suppliers, setSuppliers, onPreview }) => {
            const [mode, setMode] = useState('existing');
            const [cart, setCart] = useState([]);
            const [supplierName, setSupplierName] = useState('');
            const [inboundDate, setInboundDate] = useState(new Date().toISOString().split('T')[0]);
            const [inboundNote, setInboundNote] = useState('');
            const [itemSearch, setItemSearch] = useState('');
            
            // 進貨歷史篩選與分組state
            const [inboundFilterKeyword, setInboundFilterKeyword] = useState('');
            const [inboundFilterSupplier, setInboundFilterSupplier] = useState('');
            const [inboundGroupByMonth, setInboundGroupByMonth] = useState(true);
            const [expandedMonths, setExpandedMonths] = useState({});
            
            // 單據合併state
            const [mergeMode, setMergeMode] = useState(false);
            const [selectedForMerge, setSelectedForMerge] = useState([]);
            
            const [currentItem, setCurrentItem] = useState({ 
                name: '', spec: '', cost: 0, qty: 1, retail: 0, 
                batchNo: '', mfgDate: '', expDate: '' 
            });

            const [editModalOpen, setEditModalOpen] = useState(false);
            const [editingTx, setEditingTx] = useState(null);

            const searchResults = itemSearch ? inventory.filter(i => (i.name || '').includes(itemSearch)) : [];

            const prepAddToCart = (item) => {
                setCurrentItem({
                    id: item.id,
                    name: item.name,
                    spec: item.spec,
                    cost: item.avgCost,
                    qty: 1,
                    retail: item.retailPrice,
                    batchNo: '',
                    mfgDate: inboundDate,
                    expDate: '',
                    type: 'existing'
                });
                setItemSearch(''); 
            };

            const confirmAddItem = () => {
                if(!currentItem.name) return;
                
                const itemId = currentItem.type === 'existing' ? currentItem.id : generateId();
                const prodId = currentItem.type === 'existing' ? currentItem.id : 'NEW_' + generateId();

                setCart([...cart, {
                    id: itemId,
                    productId: prodId,
                    name: currentItem.name,
                    spec: currentItem.spec,
                    inboundQty: Number(currentItem.qty),
                    inboundCost: Number(currentItem.cost),
                    retailPrice: Number(currentItem.retail),
                    batchNo: currentItem.batchNo || `BATCH-${Date.now().toString().substr(-6)}`, 
                    mfgDate: currentItem.mfgDate,
                    expDate: currentItem.expDate,
                    type: currentItem.type
                }]);
                
                setCurrentItem({ name: '', spec: '', cost: 0, qty: 1, retail: 0, batchNo: '', mfgDate: '', expDate: '' });
                if(mode === 'existing') setItemSearch(''); 
            };

            const submitInbound = () => {
                if(cart.length === 0) return alert('進貨清單為空');
                if(!supplierName) return alert('請輸入供應商名稱');

                const trimmedSup = supplierName.trim();
                const supExists = suppliers.find(s => s.name === trimmedSup);
                
                if (!supExists && trimmedSup) {
                    const newSupplier = {
                        id: generateId(),
                        name: trimmedSup,
                        contact: '',
                        phone: ''
                    };
                    setSuppliers(prev => [...prev, newSupplier]);
                }

                const newTx = {
                    id: generateId(),
                    type: 'IN',
                    date: inboundDate,
                    docNo: generateDocNoFor('IN', transactions),
                    partner: supplierName,
                    items: cart.map(c => ({
                        productId: c.productId,
                        name: c.name,
                        spec: c.spec,
                        qty: c.inboundQty,
                        price: c.inboundCost,
                        batchNo: c.batchNo,
                        mfgDate: c.mfgDate,
                        expDate: c.expDate
                    })),
                    total: cart.reduce((acc, c) => acc + (c.inboundQty * c.inboundCost), 0),
                    note: inboundNote || '手動進貨單'
                };

                const newInventory = updateInventoryStock(inventory, cart, 'add', { supplier: supplierName });
                setInventory(newInventory);

                setTransactions([newTx, ...transactions]);
                setCart([]);
                setSupplierName('');
                setInboundNote('');
                alert('進貨單已建立，庫存與批號資料已更新！');
            };

            const previewCurrent = () => {
                if (cart.length === 0) return alert('清單為空');
                const total = cart.reduce((acc, c) => acc + (c.inboundQty * c.inboundCost), 0);
                const mockTx = {
                    id: 'PREVIEW',
                    type: 'IN',
                    date: inboundDate,
                    docNo: '進貨單(預覽)',
                    partner: supplierName || '未填供應商',
                    items: cart.map(c => ({ ...c, qty: c.inboundQty, price: c.inboundCost })),
                    total: total,
                    note: inboundNote || '預覽模式'
                };
                onPreview(mockTx);
            };

            const handleVoid = (tx) => {
                // 檢查品項是否已被刪除
                const deletedItems = tx.items.filter(item => {
                    const found = inventory.find(i => i.id === item.productId || (i.name === item.name && i.spec === item.spec));
                    return !found;
                });

                const hasDeletedItems = deletedItems.length > 0;
                let confirmMsg = `確定要作廢進貨單 ${tx.docNo} 嗎？\n\n`;
                
                if (hasDeletedItems) {
                    confirmMsg += `⚠️ 警告：以下品項已被刪除，將直接作廢而不扣除庫存：\n`;
                    deletedItems.forEach(item => {
                        confirmMsg += `  • ${item.name}\n`;
                    });
                    confirmMsg += `\n現有品項將正常扣除庫存。`;
                } else {
                    confirmMsg += `注意：這將會扣除庫存，若庫存不足將無法作廢。`;
                }

                if (!confirm(confirmMsg)) return;

                const inventoryMap = new Map(inventory.map(i => [i.id, i]));
                let canVoid = true;
                let errorMsg = '';
                const itemsToDeduct = [];

                // 驗證現有品項的庫存足額
                for (const item of tx.items) {
                    const found = inventory.find(i => i.id === item.productId || (i.name === item.name && i.spec === item.spec));
                    
                    if (!found) {
                        // 品項已被刪除，跳過庫存檢查 - 允許作廢
                        continue;
                    }

                    // 品項仍存在，檢查庫存足額
                    if (found.qty < item.qty) {
                        canVoid = false;
                        errorMsg = `庫存不足：${item.name} (現有 ${found.qty}, 需扣除 ${item.qty})`;
                        break;
                    }
                    itemsToDeduct.push(item);
                }

                if (!canVoid) {
                    alert(`作廢失敗！\n${errorMsg}\n\n原因：部分商品可能已售出，導致庫存不足以扣回。`);
                    return;
                }

                // 只扣除仍要存在的品項庫存
                const newInventory = inventory.map(inv => {
                    const txItem = itemsToDeduct.find(t => t.productId === inv.id || (t.name === inv.name && t.spec === inv.spec));
                    if (txItem) {
                        return { ...inv, qty: inv.qty - txItem.qty };
                    }
                    return inv;
                });

                setInventory(newInventory);
                setTransactions(prev => prev.filter(t => t.id !== tx.id));
                
                let voidMsg = `單據 ${tx.docNo} 已作廢`;
                if (itemsToDeduct.length > 0) {
                    voidMsg += `，${itemsToDeduct.length} 項品項庫存已回扣`;
                }
                if (deletedItems.length > 0) {
                    voidMsg += `，${deletedItems.length} 項已刪除品項已略過扣除`;
                }
                voidMsg += `。`;
                
                alert(voidMsg);
            };

            const openEditModal = (tx) => {
                setEditingTx(tx);
                setEditModalOpen(true);
            };

            const saveEditMetadata = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                const updatedTx = {
                    ...editingTx,
                    date: formData.get('date'),
                    partner: formData.get('partner'),
                    note: formData.get('note')
                };

                setTransactions(prev => prev.map(t => t.id === updatedTx.id ? updatedTx : t));
                setEditModalOpen(false);
                setEditingTx(null);
                alert('單據資訊已更新 (不影響庫存)');
            };

            const mergeDocuments = () => {
                if (selectedForMerge.length === 0) return alert('請選擇至少一筆單據進行合併');
                
                const selectedTxs = selectedForMerge.map(id => transactions.find(t => t.id === id)).filter(t => t);
                
                // 驗證所有單據的日期和供應商相同
                const firstTx = editingTx;
                for (let tx of selectedTxs) {
                    if (tx.date !== firstTx.date) {
                        return alert('合併失敗：所有單據的進貨日期必須相同');
                    }
                    if (tx.partner !== firstTx.partner) {
                        return alert('合併失敗：所有單據的供應商必須相同');
                    }
                }

                // 合併商品明細
                const mergedItems = [...editingTx.items];
                let mergedNote = editingTx.note || '';
                let totalAmount = editingTx.total || 0;

                selectedTxs.forEach(tx => {
                    mergedItems.push(...tx.items);
                    totalAmount += tx.total || 0;
                    
                    // 在備註中添加來源單號
                    if (mergedNote === '') {
                        mergedNote = `[合併來源] ${tx.docNo}`;
                    } else {
                        mergedNote += ` | ${tx.docNo}`;
                    }
                });

                // 更新主單據
                const updatedMainTx = {
                    ...editingTx,
                    items: mergedItems,
                    note: mergedNote,
                    total: totalAmount
                };

                // 刪除被合併的單據，更新主單據
                setTransactions(prev => {
                    let updated = prev.map(t => t.id === editingTx.id ? updatedMainTx : t);
                    updated = updated.filter(t => !selectedForMerge.includes(t.id));
                    return updated;
                });

                setMergeMode(false);
                setSelectedForMerge([]);
                setEditModalOpen(false);
                setEditingTx(null);
                alert(`已將 ${selectedTxs.length} 筆單據合併至 ${editingTx.docNo}`);
            };

            const exportInboundHistory = () => {
                const inTx = transactions.filter(t => t.type === 'IN');
                const data = [];
                inTx.forEach(t => {
                    t.items.forEach(i => {
                        data.push({
                            '單號': t.docNo,
                            '進貨日期': t.date,
                            '供應商': t.partner,
                            '品名': i.name,
                            '規格': i.spec,
                            '批號': i.batchNo || '',
                            '製造日期': i.mfgDate || '',
                            '有效日期': i.expDate || '',
                            '進貨數量': i.qty,
                            '進貨單價': i.price,
                            '小計': i.qty * i.price,
                            '備註': t.note
                        });
                    });
                });
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "進貨總明細");
                XLSX.writeFile(wb, `-公司-_進貨明細_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            return (
                <div className="grid grid-cols-5 gap-4 h-full fade-in">
                    {/* Main form area */}
                    <div className="col-span-3 macaron-card p-4 flex flex-col overflow-auto">
                        <h3 className="font-bold mb-3 text-gray-700 flex items-center gap-2 text-lg"><i data-lucide="container"></i> 建立進貨單 (含批號管理)</h3>
                        <div className="text-xs text-gray-500 mb-3 italic">操作說明：於此建立進貨單並更新庫存，過程可管理批號與新商品。</div>
                        
                        {/* Compact header fields */}
                        <div className="grid grid-cols-5 gap-2 mb-3 pb-3 border-b border-gray-100">
                            <div className="col-span-2">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">供應商名稱</label>
                                <input list="suppliersList" className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-purple-100" value={supplierName} onChange={e => setSupplierName(e.target.value)} placeholder="選擇或輸入..." />
                                <datalist id="suppliersList">{suppliers.map(s => <option key={s.id} value={s.name} />)}</datalist>
                            </div>
                            <div className="col-span-1.5">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">進貨日期</label>
                                <input type="date" className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-purple-100" value={inboundDate} onChange={e => setInboundDate(e.target.value)} />
                            </div>
                            <div className="col-span-1.5">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">備註/發票</label>
                                <input className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-purple-100" value={inboundNote} onChange={e => setInboundNote(e.target.value)} placeholder="選填" />
                            </div>
                        </div>

                        {/* Mode selector and form - compact */}
                        <div className="bg-purple-50 p-3 rounded-xl mb-3 border border-purple-100">
                            <div className="flex gap-3 mb-3 items-center">
                                <button onClick={() => { setMode('existing'); setCurrentItem({...currentItem, type: 'existing', name: ''}); }} className={`text-xs font-bold px-3 py-1 rounded-lg transition ${mode === 'existing' ? 'bg-purple-400 text-white' : 'bg-white text-purple-600 border border-purple-200'}`}>+ 補貨</button>
                                <button onClick={() => { setMode('new'); setCurrentItem({...currentItem, type: 'new', name: ''}); }} className={`text-xs font-bold px-3 py-1 rounded-lg transition ${mode === 'new' ? 'bg-purple-400 text-white' : 'bg-white text-purple-600 border border-purple-200'}`}>+ 新品</button>
                            </div>

                            {/* Search Area for Existing */}
                            {mode === 'existing' && !currentItem.name && (
                                <div className="relative mb-2">
                                    <input className="w-full border border-purple-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-purple-300" value={itemSearch} onChange={e => setItemSearch(e.target.value)} placeholder="搜尋現有產品..." autoFocus />
                                    {searchResults.length > 0 && (
                                        <div className="absolute top-full left-0 w-full bg-white border border-purple-100 shadow-lg max-h-40 overflow-auto z-50 rounded-lg mt-1">
                                            {searchResults.map(item => (
                                                <div key={item.id} onClick={() => prepAddToCart(item)} className="p-2 hover:bg-purple-50 cursor-pointer flex justify-between text-xs">
                                                    <span>{item.name} - {item.spec}</span>
                                                    <span className="text-gray-400">存: {item.qty} | ${formatCurrency(item.avgCost)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Input Form - horizontal */}
                            {(mode === 'new' || (mode === 'existing' && currentItem.name)) && (
                                <div className="space-y-2">
                                    <div className="grid grid-cols-6 gap-2">
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold mb-0.5 text-gray-500">產品名稱</label>
                                            <input className="border border-purple-200 p-1.5 rounded-lg w-full bg-white text-sm" 
                                                value={currentItem.name} 
                                                onChange={e => setCurrentItem({...currentItem, name: e.target.value})} 
                                                readOnly={mode==='existing'} 
                                                placeholder="產品名稱"
                                            />
                                        </div>
                                        <div className="col-span-1.5">
                                            <label className="block text-[10px] font-bold mb-0.5 text-gray-500">規格</label>
                                            <input className="border border-purple-200 p-1.5 rounded-lg w-full bg-white text-sm" 
                                                value={currentItem.spec}

                                                readOnly={mode==='existing'} 
                                            />
                                        </div>
                                        <div className="col-span-0.75">
                                            <label className="block text-[10px] font-bold mb-0.5 text-purple-600">數量</label>
                                            <input type="number" className="border border-purple-200 p-1.5 rounded-lg w-full bg-white text-sm" value={currentItem.qty} onChange={e => setCurrentItem({...currentItem, qty: e.target.value})} />
                                        </div>
                                        <div className="col-span-0.75">
                                            <label className="block text-[10px] font-bold mb-0.5 text-purple-600">成本</label>
                                            <input type="number" className="border border-purple-200 p-1.5 rounded-lg w-full bg-white text-sm" value={currentItem.cost} onChange={e => setCurrentItem({...currentItem, cost: e.target.value})} />

                                        <div className="col-span-0.75">
