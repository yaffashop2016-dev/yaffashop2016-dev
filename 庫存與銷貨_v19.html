                                <div className="mt-4 p-4 rounded-xl bg-gray-50 border border-gray-100">
                                    <p className="text-xs text-gray-500 italic">提示：系統會根據成本和預期利潤率自動計算建議售價</p>
                                </div>
                            </div>

                            <div className="macaron-card p-6">
                                <h3 className="font-bold text-gray-700 text-lg mb-4 flex items-center gap-2">
                                    <div className="bg-orange-100 p-2 rounded-full text-orange-500"><i data-lucide="percent"></i></div>
                                    步驟 2: 平台與隱形成本
                                </h3>
                                
                                <div className="mb-4">
                                    <label className="block text-xs font-bold text-gray-400 mb-1">平台名稱 (選填，方便分類)</label>
                                    <input 
                                        className="w-full border border-gray-200 p-2.5 rounded-xl" 
                                        placeholder="例如: 蝦皮、露天、官網..." 
                                        value={platformName}
                                        onChange={e => setPlatformName(e.target.value)}
                                    />
                                </div>

                                {platforms.length > 0 && (
                                    <div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-xl">
                                        <label className="block text-xs font-bold text-green-700 mb-2">⚡ 快速帶入平台模板</label>
                                        <select 
                                            className="w-full border border-green-300 p-2 rounded-lg text-sm bg-white focus:ring-2 focus:ring-green-200 outline-none"
                                            defaultValue=""
                                            onChange={(e) => {
                                                const selected = platforms.find(p => p.id === e.target.value);
                                                if (selected) {
                                                    setPlatformName(selected.name);
                                                    setPlatformRate(selected.platformFeeRate || 5);
                                                    setPaymentRate(selected.paymentFeeRate || 2);
                                                    setOtherRate(selected.activityFeeRate || 0);
                                                    setLaborCost(selected.packagingCost || 0);
                                                    setShippingCost(selected.shippingCost || 0);
                                                }
                                            }}
                                        >
                                            <option value="">選擇平台模板...</option>
                                            {platforms.map(p => (
                                                <option key={p.id} value={p.id}>
                                                    {p.name} (手續費: {(p.platformFeeRate + p.paymentFeeRate + p.activityFeeRate).toFixed(1)}%)
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                )}

                                <div className="grid grid-cols-3 gap-4 mb-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">平台抽成 (%)</label>
                                        <input type="number" step="0.1" className="w-full border border-gray-200 p-2.5 rounded-xl" value={platformRate} onChange={e => setPlatformRate(Number(e.target.value))} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">金流手續費 (%)</label>
                                        <input type="number" step="0.1" className="w-full border border-gray-200 p-2.5 rounded-xl" value={paymentRate} onChange={e => setPaymentRate(Number(e.target.value))} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">其他雜費 (%)</label>
                                        <input type="number" step="0.1" className="w-full border border-gray-200 p-2.5 rounded-xl" value={otherRate} onChange={e => setOtherRate(Number(e.target.value))} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">人工包裝費 ($)</label>
                                        <input type="number" className="w-full border border-gray-200 p-2.5 rounded-xl" value={laborCost} onChange={e => setLaborCost(Number(e.target.value))} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 mb-1">預估運費 ($)</label>
                                        <input type="number" className="w-full border border-gray-200 p-2.5 rounded-xl" value={shippingCost} onChange={e => setShippingCost(Number(e.target.value))} />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="macaron-card p-6 border-l-4 border-pink-300 flex flex-col h-full bg-pink-50/30">
                            <h3 className="font-bold text-xl text-gray-700 mb-6 flex items-center gap-2">
                                <i data-lucide="calculator" className="text-pink-500"></i> 試算結果
                            </h3>

                            <div className="mb-6">
                                <label className="block text-sm font-bold text-gray-600 mb-2">最終設定價格</label>
                                <input 
                                    type="number" 
                                    className="w-full border-2 border-pink-200 p-4 rounded-2xl text-3xl font-bold text-pink-600 text-right focus:ring-4 focus:ring-pink-100 outline-none transition" 
                                    value={price} 
                                    onChange={e => setPrice(Number(e.target.value))}
                                    placeholder="輸入定價"
                                />
                                <p className="text-xs text-right mt-1 text-gray-400">請在此輸入您想在平台上販售的價格</p>
                            </div>

                            <div className="mb-4 grid grid-cols-2 gap-3">
                                <div className="bg-white p-3 rounded-xl border border-gray-200">
                                    <div className="text-xs text-gray-500 mb-1">建議售價 1: 成本 + 30%</div>
                                    <div className="text-xl font-bold text-indigo-600">${suggestedPrice30}</div>
                                    <div className="text-xs text-gray-500 mt-1">毛利: ${profit30}</div>
                                </div>
                                <div className="bg-white p-3 rounded-xl border border-gray-200">
                                    <div className="text-xs text-gray-500 mb-1">建議售價 2: 成本 + 50%</div>
                                    <div className="text-xl font-bold text-indigo-600">${suggestedPrice50}</div>
                                    <div className="text-xs text-gray-500 mt-1">毛利: ${profit50}</div>
                                </div>
                            </div>

                            <div className="space-y-3 flex-1">
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-500">(-) 平台抽成 ({platformRate}%)</span>
                                    <span className="font-medium text-gray-700">${calculations.platformFee}</span>
                                </div>
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-500">(-) 金流手續費 ({paymentRate}%)</span>
                                    <span className="font-medium text-gray-700">${calculations.paymentFee}</span>
                                </div>
                                {(calculations.otherFee > 0) && (
                                    <div className="flex justify-between text-sm">
                                        <span className="text-gray-500">(-) 其他雜費 ({otherRate}%)</span>
                                        <span className="font-medium text-gray-700">${calculations.otherFee}</span>
                                    </div>
                                )}
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-500">(-) 人工與運費</span>
                                    <span className="font-medium text-gray-700">${Number(laborCost) + Number(shippingCost)}</span>
                                </div>
                                <div className="border-t border-dashed border-gray-300 my-2"></div>
                                <div className="flex justify-between text-sm">
                                    <span className="text-gray-500">(-) 產品成本</span>
                                    <span className="font-medium text-gray-700">${cost}</span>
                                </div>
                            </div>

                            <div className={`mt-6 p-5 rounded-2xl border-2 ${calculations.actualProfit >= 0 ? 'bg-green-100 border-green-200' : 'bg-red-100 border-red-200'}`}>
                                <div className="flex justify-between items-end mb-1">
                                    <span className={`text-sm font-bold ${calculations.actualProfit >= 0 ? 'text-green-600' : 'text-red-500'}`}>實際淨利</span>
                                    <span className={`text-3xl font-bold ${calculations.actualProfit >= 0 ? 'text-green-600' : 'text-red-500'}`}>
                                        ${Math.round(calculations.actualProfit)}
                                    </span>
                                </div>
                                <div className="text-right text-xs font-bold opacity-70">
                                    淨利率: {calculations.actualMargin.toFixed(1)}%
                                </div>
                            </div>
                            
                            <button onClick={handleSaveRecord} className="mt-4 w-full bg-pink-400 text-white py-3 rounded-xl font-bold hover:bg-pink-500 shadow-md shadow-pink-200 transition transform active:scale-95 flex justify-center items-center gap-2">
                                <i data-lucide="save"></i> 儲存試算紀錄
                            </button>
                        </div>
                    </div>
                    
                    <div className="macaron-card p-6">
                        <div className="flex justify-between items-center mb-4">
                             <h3 className="font-bold text-gray-700 text-lg flex items-center gap-2">
                                <i data-lucide="history" className="text-purple-400"></i> 歷史試算紀錄
                            </h3>
                            <button onClick={exportHistory} className="text-sm bg-green-100 text-green-600 px-4 py-2 rounded-xl font-bold hover:bg-green-200 flex items-center gap-2">
                                <i data-lucide="sheet"></i> 匯出紀錄 (XLSX)
                            </button>
                        </div>
                        <div className="overflow-x-auto rounded-xl border border-gray-100">
                            <table className="w-full text-sm text-left macaron-table">
                                <thead>
                                    <tr>
                                        <th className="p-3">日期</th>
                                        <th className="p-3">平台</th>
                                        <th className="p-3">產品名稱</th>
                                        <th className="p-3">規格</th>
                                        <th className="p-3 text-right">成本</th>
                                        <th className="p-3 text-right">定價</th>
                                        <th className="p-3 text-right">預估淨利</th>
                                        <th className="p-3 text-right">淨利率</th>
                                        <th className="p-3 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {priceHistory.map(r => (
                                        <tr key={r.id} className="border-b border-gray-50 hover:bg-purple-50/30">
                                            <td className="p-3 text-gray-400 text-xs">{r.date}</td>
                                            <td className="p-3 font-bold text-purple-500">{r.platform}</td>
                                            <td className="p-3 font-bold text-gray-700">{r.product}</td>
                                            <td className="p-3 text-gray-600">{r.spec || '-'}</td>
                                            <td className="p-3 text-right text-gray-500">${r.cost}</td>
                                            <td className="p-3 text-right font-bold text-blue-600">${r.price}</td>
                                            <td className={`p-3 text-right font-bold ${r.profit >= 0 ? 'text-green-500' : 'text-red-500'}`}>${r.profit}</td>
                                            <td className="p-3 text-right">{r.margin}%</td>
                                            <td className="p-3 text-center">
                                                <button onClick={() => handleDeleteRecord(r.id)} className="text-red-300 hover:text-red-500 btn-delete p-1.5 rounded-full"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {priceHistory.length === 0 && <tr><td colSpan="8" className="p-8 text-center text-gray-400">尚無儲存的紀錄</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const OutboundView = ({ inventory, setInventory, transactions, setTransactions, orders, onPreview, initialQuote = null, onClearPreset }) => {
            const [cart, setCart] = useState([]);
            const [customer, setCustomer] = useState('');
            const [taxType, setTaxType] = useState('inc'); 
            const [quotationSearch, setQuotationSearch] = useState(initialQuote?.quotationNo || '');
            const [itemSearch, setItemSearch] = useState('');
            const [orderNote, setOrderNote] = useState('');
            const [customHeader, setCustomHeader] = useState('');
            const [customFooter, setCustomFooter] = useState('');
            
            const [historySearch, setHistorySearch] = useState('');
            const [showHistory, setShowHistory] = useState(false);
            
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [showHistory]);

            useEffect(() => {
                if (!initialQuote || !initialQuote.items || initialQuote.items.length === 0) return;
                const mapped = initialQuote.items.map(q => {
                    const invItem = inventory.find(i => i.name === q.productName && i.spec === q.spec);
                    if (invItem) {
                        return { ...invItem, productId: invItem.id, cartQty: q.qty, cartPrice: q.unitPrice };
                    }
                    return {
                        id: generateId(),
                        name: q.productName,
                        spec: q.spec || '',
                        avgCost: Number(q.unitPrice),
                        qty: 0,
                        productId: 'TEMP_' + generateId(),
                        cartQty: q.qty,
                        cartPrice: q.unitPrice
                    };
                });
                setCart(prev => [...prev, ...mapped]);
                if (initialQuote.quotationNo) setQuotationSearch(initialQuote.quotationNo);
                if (initialQuote.meta) {
                    if (initialQuote.meta.customerName) setCustomer(initialQuote.meta.customerName);
                    if (initialQuote.meta.remark) setOrderNote(initialQuote.meta.remark);
                }
                onClearPreset && onClearPreset();
            }, [initialQuote, inventory, onClearPreset]);

            const searchResults = itemSearch ? inventory.filter(i => (i.name || '').toLowerCase().includes(itemSearch.toLowerCase()) && i.qty > 0) : [];

            // helper to create docNo for new outbound orders using 民國年+MMDD+sequence
            const generateDocNo = () => {
                const today = new Date();
                const mYear = today.getFullYear() - 1911;
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const datePart = `${mYear}${mm}${dd}`;
                const sameCount = transactions.filter(t => t.type === 'OUT' && t.docNo && t.docNo.startsWith(`OUT-${datePart}`)).length;
                const seq = String(sameCount + 1).padStart(3, '0');
                return `OUT-${datePart}${seq}`;
            };

            const addToCart = (item) => {
                const existing = cart.find(c => c.productId === item.id);
                if (existing) return;
                setCart([...cart, { ...item, productId: item.id, cartQty: 1, cartPrice: item.retailPrice || item.avgCost }]);
                setItemSearch('');
            };

            const importByQuotation = () => {
                const foundOrders = orders.filter(o => o.quotationNo === quotationSearch);
                if (foundOrders.length === 0) return alert('找不到此報價單號的歷史紀錄');
                
                const newItems = [];
                foundOrders.forEach(ord => {
                    const invItem = inventory.find(i => i.name === ord.productName && i.spec === ord.spec);
                    if (invItem) {
                        newItems.push({
                            ...invItem,
                            productId: invItem.id,
                            cartQty: ord.qty,
                            cartPrice: ord.unitCost
                        });
                    } else {
                        newItems.push({
                            id: generateId(),
                            name: ord.productName,
                            spec: ord.spec,
                            avgCost: 0,
                            qty: 0,
                            productId: 'TEMP_'+generateId(),
                            cartQty: ord.qty,
                            cartPrice: ord.unitCost
                        });
                    }
                });
                setCart([...cart, ...newItems]);
                alert(`已帶入 ${newItems.length} 項產品`);
            };

            const submitOrder = () => {
                if (cart.length === 0 || !customer) return alert('請填寫客戶名稱並加入商品');

                const split = cart.reduce((acc, item) => {
                    const stockItem = inventory.find(i => i.id === item.productId);
                    const available = stockItem ? stockItem.qty : 0;
                    if (available >= item.cartQty) {
                        acc.ready.push({ ...item });
                    } else if (available > 0) {
                        acc.ready.push({ ...item, cartQty: available });
                        acc.preorder.push({ ...item, cartQty: item.cartQty - available });
                    } else {
                        acc.preorder.push({ ...item });
                    }
                    return acc;
                }, { ready: [], preorder: [] });

                if (split.ready.length === 0 && split.preorder.length === 0) {
                    return alert('出貨清單為空，無法建立單據');
                }

                // 出貨單、預購單都需要可計算的金額與稅金
                const calcTotals = (items) => {
                    const sub = items.reduce((acc, item) => acc + (item.cartQty * item.cartPrice), 0);
                    const tax = taxType === 'exc' ? sub * 0.05 : (sub - (sub / 1.05));
                    const total = taxType === 'exc' ? sub + tax : sub;
                    return { sub, tax, total };
                };

                const readyItems = split.ready.map(item => ({
                    ...item,
                    qty: item.cartQty,
                    price: item.cartPrice
                }));
                const preorderItems = split.preorder.map(item => ({
                    ...item,
                    qty: item.cartQty,
                    price: item.cartPrice
                }));

                const readyTotals = calcTotals(readyItems);
                const preorderTotals = calcTotals(preorderItems);

                const baseNote = [orderNote, quotationSearch ? `來源報價單: ${quotationSearch}` : ''].filter(Boolean).join(' | ');

                const transactionsToAdd = [];

                if (readyItems.length > 0) {
                    transactionsToAdd.push({
                        id: generateId(),
                        type: 'OUT',
                        date: new Date().toISOString().split('T')[0],
                        docNo: generateDocNoFor('OUT', transactions),
                        partner: customer,
                        items: readyItems,
                        subtotal: readyTotals.sub,
                        tax: readyTotals.tax,
                        total: readyTotals.total,
                        taxType: taxType,
                        note: baseNote || '出貨單',
                        header: customHeader,
                        footer: customFooter
                    });
                }

                if (preorderItems.length > 0) {
                    transactionsToAdd.push({
                        id: generateId(),
                        type: 'PREORDER',
                        date: new Date().toISOString().split('T')[0],
                        docNo: generateDocNoFor('PRE', transactions),
                        partner: customer,
                        items: preorderItems,
                        subtotal: preorderTotals.sub,
                        tax: preorderTotals.tax,
                        total: preorderTotals.total,
                        taxType: taxType,
                        note: baseNote ? `預購單 (${baseNote})` : '預購單',
                        header: customHeader,
                        footer: customFooter
                    });
                }

                const newInventory = updateInventoryStock(inventory, readyItems, 'subtract');
                setInventory(newInventory);
                setTransactions([...transactionsToAdd, ...transactions]);
                setCart([]);
                setCustomer('');
                setQuotationSearch('');
                setOrderNote('');

                if (split.preorder.length > 0 && split.ready.length > 0) {
                    alert(`已建立出貨單及預購單：出貨 ${split.ready.length} 項，預購 ${split.preorder.length} 項`);
                } else if (split.preorder.length > 0) {
                    alert(`庫存不足，已建立預購單 (${split.preorder.length} 項)`);
                } else {
                    alert('出貨單建立完成！');
                }
            };

            const previewCurrent = () => {
                if (cart.length === 0) return alert('清單為空');
                const subtotal = cart.reduce((acc, item) => acc + (item.cartQty * item.cartPrice), 0);
                const mockTx = {
                    id: 'PREVIEW',
                    type: 'OUT',
                    date: new Date().toISOString().split('T')[0],
                    docNo: generateDocNoFor('OUT', transactions),
                    partner: customer || '未指定客戶',
                    items: cart,
                    total: subtotal,
                    note: orderNote || '預覽檢貨單',
                    header: customHeader,
                    footer: customFooter
                };
                onPreview(mockTx);
            };

            const handleEditTransaction = (tx) => {
                if (!confirm('修改將會先刪除此單據並回補庫存，並將內容帶回填寫區，確定嗎？')) return;

                const restoredInventory = updateInventoryStock(inventory, tx.items, 'add');
                setInventory(restoredInventory);
                setTransactions(transactions.filter(t => t.id !== tx.id));
                setCart(tx.items.map(i => ({
                    ...i,
                    cartQty: i.cartQty ?? i.qty ?? 0,
                    cartPrice: i.cartPrice ?? i.price ?? 0
                })));
                setCustomer(tx.partner);
                setTaxType(tx.taxType || 'inc');
                setOrderNote(tx.note || '');
                setCustomHeader(tx.header || '');
                setCustomFooter(tx.footer || '');
            };

            const subTotal = cart.reduce((acc, i) => acc + (i.cartQty * i.cartPrice), 0);
            const taxAmt = taxType === 'exc' ? Math.round(subTotal * 0.05) : Math.round(subTotal - (subTotal / 1.05));
            const grandTotal = taxType === 'exc' ? subTotal + taxAmt : subTotal;

            const filteredHistory = transactions.filter(t => (t.type === 'OUT' || t.type === 'PREORDER') && t.partner.includes(historySearch));

            const exportHistoryToExcel = () => {
                const outs = transactions.filter(t => t.type === 'OUT' || t.type === 'PREORDER');
                // summary sheet
                const summaryRows = outs.map(t => ({
                    單號: t.docNo,
                    日期: t.date,
                    客戶: t.partner,
                    品項數: t.items.length,
                    總額: t.total,
                    備註: t.note || '',
                    表頭: t.header || '',
                    表尾: t.footer || ''
                }));
                // detail sheet
                const detailRows = [];
                outs.forEach(t => {
                    t.items.forEach(it => {
                        detailRows.push({
                            單號: t.docNo,
                            日期: t.date,
                            客戶: t.partner,
                            品名: it.name,
                            規格: it.spec,
                            數量: it.cartQty !== undefined ? it.cartQty : (it.qty || ''),
                            單價: it.cartPrice !== undefined ? it.cartPrice : (it.price || ''),
                            小計: (it.cartQty !== undefined ? it.cartQty : (it.qty || 0)) * (it.cartPrice !== undefined ? it.cartPrice : (it.price || 0))
                        });
                    });
                });

                const wb = XLSX.utils.book_new();
                const ws1 = XLSX.utils.json_to_sheet(summaryRows);
                XLSX.utils.book_append_sheet(wb, ws1, 'Summary');
                const ws2 = XLSX.utils.json_to_sheet(detailRows);
                XLSX.utils.book_append_sheet(wb, ws2, 'Details');
                XLSX.writeFile(wb, `出貨歷史_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            return (
                <div className="grid grid-cols-3 gap-6 h-full fade-in">
                    <div className={`macaron-card p-4 flex flex-col ${showHistory ? 'col-span-2' : 'col-span-3 transition-all'}`}>
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                                <div className="bg-pink-100 p-2 rounded-full text-pink-500"><i data-lucide="shopping-cart"></i></div>
                                <h3 className="font-bold text-gray-700 text-lg">出貨單建立</h3>
                            </div>
                            {!showHistory && (
                                <button onClick={() => setShowHistory(true)} className="text-sm bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-200 border border-gray-200 flex items-center gap-1 transition">
                                    <i data-lucide="history" className="w-3 h-3"></i> 查看歷史紀錄
                                </button>
                            )}
                        </div>
                        {/* 操作說明 */}
                        <p className="text-xs text-gray-500 mb-3 italic">操作說明：在此頁建立或修改出貨單，完成後庫存會扣除，可透過歷史紀錄查看或匯出XLSX。</p>

                        {initialQuote?.meta && (
                            <div className="p-3 mb-3 border border-blue-100 bg-blue-50 rounded-lg text-sm text-blue-700">
                                <div className="font-bold">轉單來源摘要</div>
                                <div>來源報價單號: {initialQuote.quotationNo || '-'} </div>
                                <div>來源客戶: {initialQuote.meta.customerName || '-'} </div>
                                <div>來源日期: {initialQuote.meta.date || '-'} </div>
                                <div>來源狀態: {initialQuote.meta.status || '-'} </div>
                                <div>來源備註: {initialQuote.meta.remark || '-'}</div>
                            </div>
                        )}

                        {/* compact header rows */}
                        <div className="grid grid-cols-5 gap-2 mb-3 pb-2 border-b border-gray-100">
                            <div className="col-span-2">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">客戶</label>
                                <input className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-pink-100" value={customer} onChange={e => setCustomer(e.target.value)} placeholder="客戶名稱" />
                            </div>
                            <div className="col-span-1">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">稅別</label>
                                <select className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-pink-100 bg-white" value={taxType} onChange={e => setTaxType(e.target.value)}>
                                    <option value="inc">含稅</option>
                                    <option value="exc">外加</option>
                                </select>
                            </div>
                            <div className="col-span-2">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">備註 / 訂單說明</label>
                                <input className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-pink-100" value={orderNote} onChange={e => setOrderNote(e.target.value)} placeholder="選填" />
                            </div>
                        </div>

                        <div className="grid grid-cols-5 gap-2 mb-3">
                            <div className="col-span-2">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">單據表頭</label>
                                <input className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-pink-100" value={customHeader} onChange={e => setCustomHeader(e.target.value)} placeholder="可留空" />
                            </div>
                            <div className="col-span-3">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">單據表尾</label>
                                <input className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-pink-100" value={customFooter} onChange={e => setCustomFooter(e.target.value)} placeholder="可留空" />
                            </div>
                        </div>

                        <div className="grid grid-cols-5 gap-2 mb-4">
                            <div className="col-span-3 relative">
                                <label className="block text-xs font-bold mb-0.5 text-gray-400">加入商品 (搜尋)</label>
                                <input 
                                    className="w-full border border-gray-200 p-1.5 rounded-lg text-sm outline-none focus:ring-1 focus:ring-pink-100" 
                                    value={itemSearch} 
                                    onChange={e => setItemSearch(e.target.value)}
                                    placeholder="輸入名稱..." 
                                />
                                {searchResults.length > 0 && (
                                    <div className="absolute top-full left-0 w-full bg-white border border-pink-100 shadow-xl max-h-48 overflow-auto z-50 rounded-xl mt-1 text-xs">
                                        {searchResults.map(item => (
                                            <div key={item.id} onClick={() => addToCart(item)} className="p-2 hover:bg-pink-50 cursor-pointer flex justify-between">
                                                <span>{item.name} - {item.spec}</span>
                                                <span className="text-gray-400">${item.retailPrice} | 存: {item.qty}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div className="col-span-2">
                                <label className="block text-xs font-bold mb-0.5 text-blue-400">或 依報價單號</label>
                                <div className="flex text-xs">
                                    <input className="border border-gray-200 p-1.5 rounded-l-lg w-full outline-none focus:ring-1 focus:ring-blue-100" value={quotationSearch} onChange={e => setQuotationSearch(e.target.value)} placeholder="報價單號" />
                                    <button onClick={importByQuotation} className="bg-blue-400 text-white px-2 rounded-r-lg hover:bg-blue-500"><i data-lucide="download" className="w-4 h-4"></i></button>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-auto border border-gray-100 rounded-xl mb-4">
                            <table className="w-full text-sm text-left macaron-table">
                                <thead className="sticky top-0 bg-gray-50">
                                    <tr>
                                        <th className="p-3">品名</th>
                                        <th className="p-3 text-right">數量</th>
                                        <th className="p-3 text-right">單價</th>
                                        <th className="p-3 text-right">小計</th>
                                        <th className="p-3 text-center"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {cart.map((item, idx) => (
                                        <tr key={idx} className="border-b border-gray-50">
                                            <td className="p-3">
                                                <div className="font-bold text-gray-700">{item.name}</div>
                                                <div className="text-xs text-gray-400">{item.spec}</div>
                                                {item.qty < item.cartQty && <div className="text-xs text-red-400 font-bold bg-red-50 px-1 rounded inline-block mt-1">庫存不足! (剩{item.qty})</div>}
                                            </td>
                                            <td className="p-3 text-right">
                                                <input type="number" min="1" className="w-16 p-1 text-right rounded-lg bg-gray-50 table-input" value={item.cartQty} 
                                                    onChange={(e) => {
                                                        const newCart = [...cart];
                                                        newCart[idx].cartQty = Number(e.target.value);
                                                        setCart(newCart);
                                                    }} 
                                                />
                                            </td>
                                            <td className="p-3 text-right">
                                                <input type="number" className="w-20 p-1 text-right rounded-lg bg-gray-50 table-input" value={item.cartPrice} 
                                                    onChange={(e) => {
                                                        const newCart = [...cart];
                                                        newCart[idx].cartPrice = Number(e.target.value);
                                                        setCart(newCart);
                                                    }} 
                                                />
                                            </td>
                                            <td className="p-3 text-right font-bold text-gray-600">{formatCurrency(item.cartQty * item.cartPrice)}</td>
                                            <td className="p-3 text-center">
                                                <button 
                                                    onClick={() => setCart(cart.filter((_, i) => i !== idx))} 
                                                    className="btn-delete p-2 text-red-300 hover:text-red-500 rounded-full" 
                                                    title="移除此項"
                                                >
                                                    <i data-lucide="trash-2" className="w-5 h-5"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div className="border-t border-dashed border-gray-200 pt-4 flex justify-end gap-8 text-right items-center">
                            <div>
                                <div className="text-gray-400 text-xs">銷售金額</div>
                                <div className="font-bold text-gray-600">{formatCurrency(subTotal)}</div>
                            </div>
                            <div>
                                <div className="text-gray-400 text-xs">稅額 ({taxType === 'inc' ? '內含' : '外加'})</div>
                                <div className="font-bold text-red-400">{formatCurrency(taxAmt)}</div>
                            </div>
                            <div className="bg-pink-50 px-4 py-2 rounded-xl">
                                <div className="text-pink-400 text-xs font-bold">總計</div>
                                <div className="text-2xl font-bold text-pink-600">{formatCurrency(grandTotal)}</div>
                            </div>
                        </div>
                        <div className="flex gap-4 mt-4">
                            <button onClick={previewCurrent} className="flex-1 bg-white border border-pink-200 text-pink-500 py-3.5 rounded-2xl font-bold hover:bg-pink-50 transition transform active:scale-95 flex items-center justify-center gap-2">
                                <i data-lucide="sheet" className="w-4 h-4"></i> 匯出XLSX
                            </button>
                            <button onClick={submitOrder} className="flex-[2] bg-pink-400 text-white py-3.5 rounded-2xl font-bold hover:bg-pink-500 shadow-lg shadow-pink-200 transition transform active:scale-95">
                                建立出貨單 (Checkout)
                            </button>
                        </div>
                    </div>

                    {showHistory && (
                        <div className="col-span-1 macaron-card p-6 h-full flex flex-col fade-in">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-bold text-gray-700 flex items-center gap-2"><i data-lucide="file-clock"></i> 歷史紀錄</h3>
                                <div className="flex gap-2">
                                    <button onClick={exportHistoryToExcel} className="text-xs bg-green-100 text-green-600 px-3 py-1 rounded-lg hover:bg-green-200 flex items-center gap-1">
                                        <i data-lucide="download" className="w-3 h-3"></i> 匯出Excel
                                    </button>
                                    <button onClick={() => setShowHistory(false)} className="text-xs bg-gray-100 text-gray-400 px-2 py-1.5 rounded-lg hover:bg-gray-200 border border-gray-200" title="收合">
                                        <i data-lucide="chevrons-right" className="w-3 h-3"></i>
                                    </button>
                                </div>
                            </div>
                            <div className="mb-4">
                                <input 
                                    className="w-full border border-gray-200 p-2 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-100" 
                                    placeholder="搜尋客戶名稱..." 
                                    value={historySearch}
                                    onChange={e => setHistorySearch(e.target.value)}
                                />
                            </div>
                            <div className="overflow-auto flex-1">
                                {filteredHistory.map(t => (

                                                    <td className="border border-gray-300 p-3 text-gray-600">{item.spec || '-'}</td>
                                                    <td className="border border-gray-300 p-3 text-right">{qty}</td>
                                                    <td className="border border-gray-300 p-3 text-right">{formatCurrency(price)}</td>
                                                    <td className="border border-gray-300 p-3 text-right font-medium">{formatCurrency(subtotal)}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                    <tfoot>
                                        <tr className="bg-gray-50 font-bold">
                                            <td colSpan="5" className="border border-gray-300 p-3 text-right">總計</td>
                                            <td className="border border-gray-300 p-3 text-right">{formatCurrency(selectedTransaction.total || selectedTransaction.subtotal || 0)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>

                            {/* 備註 */}
                            {selectedTransaction.note && (
                                <div className="mb-6 p-4 bg-blue-50 rounded-lg border-l-4 border-blue-400">
                                    <h3 className="font-bold text-gray-700 mb-2">備註</h3>
                                    <p className="text-gray-600 whitespace-pre-line">{selectedTransaction.note}</p>
                                </div>
                            )}

                            {/* 表尾 */}
                            {selectedTransaction.footer && (
                                <div className="mb-6 p-4 bg-green-50 rounded-lg border-l-4 border-green-400">
                                    <h3 className="font-bold text-gray-700 mb-2">表尾備註</h3>
                                    <p className="text-gray-600 whitespace-pre-line">{selectedTransaction.footer}</p>
                                </div>
                            )}
                        </div>
                    )}

                    {/* 正常顯示的UI */}
                    <div className="max-w-4xl mx-auto space-y-6 fade-in">
                    {/* 搜尋區域 */}
                    <div className="macaron-card p-6">
                        <div className="flex items-center gap-3 mb-4">
                            <div className="bg-purple-100 p-3 rounded-full text-purple-500">
                                <i data-lucide="search"></i>
                            </div>
                            <h3 className="text-xl font-bold text-gray-700">單據查詢與列印</h3>
                        </div>
                        
                        <div className="flex gap-4 mb-4">
                            <div className="flex-1">
                                <label className="block text-sm font-bold text-gray-600 mb-2">單據號碼</label>
                                <input 
                                    type="text" 
                                    className="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-purple-100 outline-none"
                                    placeholder="輸入單據號碼 (例如: OUT-115-0115-001)"
                                    value={searchDocNo}
                                    onChange={(e) => setSearchDocNo(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                                />
                            </div>
                            <div className="flex items-end">
                                <button 
                                    onClick={handleSearch}
                                    className="bg-purple-400 text-white px-6 py-3 rounded-xl font-bold hover:bg-purple-500 shadow-lg shadow-purple-200"
                                >
                                    <i data-lucide="search" className="w-4 h-4 mr-2 inline"></i>
                                    查詢
                                </button>
                            </div>
                        </div>
                        
                        {selectedTransaction && (
                            <div className="flex gap-4">
                                <button 
                                    onClick={handlePrint}
                                    className="bg-blue-400 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500 shadow-lg shadow-blue-200"
                                >
                                    <i data-lucide="printer" className="w-4 h-4 mr-2 inline"></i>
                                    列印單據
                                </button>
                                <button 
                                    onClick={() => {
                                        const exportTransactionToXLSX = (tx) => {
                                            const transactionData = [{
                                                '單號': tx.docNo || '',
                                                '日期': tx.date || '',
                                                '類型': tx.type || '',
                                                '對象': tx.partner || '',
                                                '總金額': tx.total || tx.subtotal || 0,
                                                '稅額': tx.tax || 0,
                                                '備註': tx.note || '',
                                                '表頭': tx.header || '',
                                                '表尾': tx.footer || ''
                                            }];

                                            const itemsData = (tx.items || []).map((item, index) => ({
                                                '項次': index + 1,
                                                '品名': item.name || '',
                                                '規格': item.spec || '',
                                                '數量': item.cartQty ?? item.returnQty ?? item.inboundQty ?? item.qty ?? 0,
                                                '單價': item.cartPrice ?? item.returnPrice ?? item.inboundCost ?? item.price ?? 0,
                                                '小計': (item.cartQty ?? item.returnQty ?? item.inboundQty ?? item.qty ?? 0) * (item.cartPrice ?? item.returnPrice ?? item.inboundCost ?? item.price ?? 0),
                                                '批號': item.batchNo || '',
                                                '製造日期': item.mfgDate || '',
                                                '到期日期': item.expDate || ''
                                            }));

                                            const wb = XLSX.utils.book_new();
                                            const wsSummary = XLSX.utils.json_to_sheet(transactionData);
                                            XLSX.utils.book_append_sheet(wb, wsSummary, "交易摘要");
                                            const wsItems = XLSX.utils.json_to_sheet(itemsData);
                                            XLSX.utils.book_append_sheet(wb, wsItems, "品項明細");
                                            const fileName = `${tx.type || '交易'}_${tx.docNo || '未編號'}_${new Date().toISOString().split('T')[0]}.xlsx`;
                                            XLSX.writeFile(wb, fileName);
                                        };
                                        exportTransactionToXLSX(selectedTransaction);
                                    }}
                                    className="bg-green-400 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-500 shadow-lg shadow-green-200"
                                >
                                    <i data-lucide="download" className="w-4 h-4 mr-2 inline"></i>
                                    匯出Excel
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 單據顯示區域 */}
                    {selectedTransaction ? (
                        <div className="macaron-card p-8 print-area">
                            {/* 列印樣式 */}
                            <style>{`
                                @media print {
                                    /* 隱藏側邊欄 */
                                    .w-64 {
                                        display: none !important;
                                    }
                                    
                                    /* 隱藏頂部導航 */
                                    header {
                                        display: none !important;
                                    }
                                    
                                    /* 隱藏通知 */
                                    .absolute.top-6.right-6 {
                                        display: none !important;
                                    }
                                    
                                    /* 隱藏按鈕和輸入框 */
                                    button, input[type="text"], input[type="number"], select, .relative > i {
                                        display: none !important;
                                    }
                                    
                                    /* 調整主要內容區域 */
                                    .flex-1.flex.flex-col.overflow-hidden.bg-\[#fff0f5\] {
                                        width: 100% !important;
                                        margin: 0 !important;
                                        padding: 0 !important;
                                    }
                                    
                                    /* 顯示單據內容 */
                                    .print-area {
                                        display: block !important;
                                        position: static !important;
                                        box-shadow: none !important;
                                        border: none !important;
                                        background: white !important;
                                        margin: 0 !important;
                                        padding: 20px !important;
                                        width: 100% !important;
                                        max-width: none !important;
                                    }
                                    
                                    /* 隱藏不需要的元素 */
                                    .no-print {
                                        display: none !important;
                                    }
                                    
                                    /* 調整表格樣式 */
                                    table {
                                        width: 100% !important;
                                        border-collapse: collapse !important;
                                        margin-bottom: 20px !important;
                                    }
                                    
                                    th, td {
                                        border: 1px solid #000 !important;
                                        padding: 8px !important;
                                        text-align: left !important;
                                    }
                                    
                                    th {
                                        background: #f5f5f5 !important;
                                        font-weight: bold !important;
                                    }
                                    
                                    /* 調整文字大小 */
                                    body {
                                        font-size: 12px !important;
                                        background: white !important;
                                        color: black !important;
                                        margin: 0 !important;
                                        padding: 0 !important;
                                    }
                                    
                                    h1 { font-size: 24px !important; }
                                    h2 { font-size: 18px !important; }
                                    h3 { font-size: 14px !important; }
                                    
                                    /* 調整頁面邊距 */
                                    @page {
                                        margin: 1cm !important;
                                    }
                                    
                                    /* 確保列印區域正確顯示 */
                                    .macaron-card.print-area {
                                        background: white !important;
                                        border: none !important;
                                        box-shadow: none !important;
                                        margin: 0 !important;
                                        padding: 0 !important;
                                    }
                                }
                            `}</style>
                            
                            {/* 單據表頭 */}
                            <div className="text-center mb-8 pb-4 border-b-2 border-gray-300">
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">{companyName}</h1>
                                <p className="text-lg text-gray-600 mb-4">{companySub}</p>
                                <h2 className="text-2xl font-bold text-purple-600">{getTransactionTypeName(selectedTransaction.type)}</h2>
                            </div>

                            {/* 單據資訊 */}
                            <div className="grid grid-cols-2 gap-6 mb-8">
                                <div className="space-y-3">
                                    <div className="flex justify-between">
                                        <span className="font-bold text-gray-700">單據號碼:</span>
                                        <span className="text-gray-800">{selectedTransaction.docNo}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="font-bold text-gray-700">日期:</span>
                                        <span className="text-gray-800">{selectedTransaction.date}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="font-bold text-gray-700">{getPartnerLabel(selectedTransaction.type)}:</span>
                                        <span className="text-gray-800">{selectedTransaction.partner}</span>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <div className="flex justify-between">
                                        <span className="font-bold text-gray-700">單據類型:</span>
                                        <span className="text-gray-800">{getTransactionTypeName(selectedTransaction.type)}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="font-bold text-gray-700">總金額:</span>
                                        <span className="text-gray-800 font-bold text-lg">{formatCurrency(selectedTransaction.total || selectedTransaction.subtotal || 0)}</span>
                                    </div>
                                    {selectedTransaction.tax && (
                                        <div className="flex justify-between">
                                            <span className="font-bold text-gray-700">稅額:</span>
                                            <span className="text-gray-800">{formatCurrency(selectedTransaction.tax)}</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* 表頭 */}
                            {selectedTransaction.header && (
                                <div className="mb-6 p-4 bg-gray-50 rounded-lg border-l-4 border-purple-400">
                                    <h3 className="font-bold text-gray-700 mb-2">表頭備註</h3>
                                    <p className="text-gray-600 whitespace-pre-line">{selectedTransaction.header}</p>
                                </div>
                            )}

                            {/* 產品明細表格 */}
                            <div className="mb-8">
                                <h3 className="text-lg font-bold text-gray-700 mb-4">產品明細</h3>
                                <table className="w-full border-collapse border border-gray-300">
                                    <thead>
                                        <tr className="bg-gray-100">
                                            <th className="border border-gray-300 p-3 text-left font-bold">項次</th>
                                            <th className="border border-gray-300 p-3 text-left font-bold">產品名稱</th>
                                            <th className="border border-gray-300 p-3 text-left font-bold">規格</th>
                                            <th className="border border-gray-300 p-3 text-right font-bold">數量</th>
                                            <th className="border border-gray-300 p-3 text-right font-bold">單價</th>
                                            <th className="border border-gray-300 p-3 text-right font-bold">小計</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(selectedTransaction.items || []).map((item, index) => {
                                            const qty = item.cartQty ?? item.returnQty ?? item.inboundQty ?? item.qty ?? 0;
                                            const price = item.cartPrice ?? item.returnPrice ?? item.inboundCost ?? item.price ?? 0;
                                            const subtotal = qty * price;
                                            
                                            return (
                                                <tr key={index} className="hover:bg-gray-50">
                                                    <td className="border border-gray-300 p-3 text-center">{index + 1}</td>
                                                    <td className="border border-gray-300 p-3 font-medium">{item.name || ''}</td>
                                                    <td className="border border-gray-300 p-3 text-gray-600">{item.spec || '-'}</td>
                                                    <td className="border border-gray-300 p-3 text-right">{qty}</td>
                                                    <td className="border border-gray-300 p-3 text-right">{formatCurrency(price)}</td>
                                                    <td className="border border-gray-300 p-3 text-right font-medium">{formatCurrency(subtotal)}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                    <tfoot>
                                        <tr className="bg-gray-50 font-bold">
                                            <td colSpan="5" className="border border-gray-300 p-3 text-right">總計</td>
                                            <td className="border border-gray-300 p-3 text-right">{formatCurrency(selectedTransaction.total || selectedTransaction.subtotal || 0)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>

                            {/* 備註 */}
                            {selectedTransaction.note && (
                                <div className="mb-6 p-4 bg-blue-50 rounded-lg border-l-4 border-blue-400">
                                    <h3 className="font-bold text-gray-700 mb-2">備註</h3>
                                    <p className="text-gray-600 whitespace-pre-line">{selectedTransaction.note}</p>
                                </div>
                            )}

                            {/* 表尾 */}
                            {selectedTransaction.footer && (
                                <div className="mb-6 p-4 bg-green-50 rounded-lg border-l-4 border-green-400">
                                    <h3 className="font-bold text-gray-700 mb-2">表尾備註</h3>
                                    <p className="text-gray-600 whitespace-pre-line">{selectedTransaction.footer}</p>
                                </div>
                            )}

                            {/* 列印資訊 */}
                            <div className="mt-12 pt-4 border-t border-gray-300 text-center text-sm text-gray-500 no-print">
                                <p>列印時間: {new Date().toLocaleString()}</p>
                                <p>系統版本: v5.8.3</p>
                            </div>
                        </div>
                    ) : searchDocNo.trim() ? (
                        <div className="macaron-card p-12 text-center">
                            <div className="bg-red-100 p-4 rounded-full w-16 h-16 mx-auto mb-4 text-red-500">
                                <i data-lucide="alert-circle" className="w-8 h-8"></i>
                            </div>
                            <h3 className="text-xl font-bold text-gray-700 mb-2">查無此單據</h3>
                            <p className="text-gray-500">單據號碼 "{searchDocNo}" 不存在於系統中</p>
                            <p className="text-sm text-gray-400 mt-2">請檢查單據號碼是否正確</p>
                        </div>
                    ) : (
                        <div className="macaron-card p-12 text-center">
                            <div className="bg-gray-100 p-4 rounded-full w-16 h-16 mx-auto mb-4 text-gray-400">
                                <i data-lucide="file-text" className="w-8 h-8"></i>
                            </div>
                            <h3 className="text-xl font-bold text-gray-700 mb-2">請輸入單據號碼</h3>
                            <p className="text-gray-500">在上方輸入框中輸入單據號碼，然後點擊查詢按鈕</p>
                            <p className="text-sm text-gray-400 mt-2">支援 OUT、IN、PREORDER、RETURN 等單據類型</p>
                        </div>
                    )}
                    </div>
                </>
            );
        };

        const ReportsView = ({ inventory, transactions, setInventory }) => {
            const exportStockTake = () => {
                const wsData = inventory.map((i, index) => ({ '序號': index + 1, '產品名稱': i.name, '規格': i.spec, '目前系統庫存': i.qty, '盤點數量': '', '備註': '' }));
                const ws = XLSX.utils.json_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "盤點單");
                XLSX.writeFile(wb, `-公司-_盤點單_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const importStockTake = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    const newInv = [...inventory];
                    let updates = 0;
                    data.forEach(row => {
                        const name = row['產品名稱'];
                        const spec = row['規格'];
                        const realQty = row['盤點數量'];
                        if (name && realQty !== undefined && realQty !== '') {
                            const item = newInv.find(i => i.name === name && (i.spec || '') === (spec || ''));
                            if (item) { item.qty = Number(realQty); updates++; }
                        }
                    });
                    if (confirm(`讀取到 ${updates} 筆庫存修正，確定更新嗎？`)) {
                        setInventory(newInv);
                        alert('庫存盤點更新完成');
                    }
                };
                reader.readAsBinaryString(file);
            };

            const exportInvoices = () => {
                const sales = transactions.filter(t => t.type === 'OUT');
                const data = sales.map(t => ({ '單號': t.docNo, '日期': t.date, '客戶': t.partner, '銷售額(未稅)': Math.round(t.taxType === 'exc' ? t.subtotal : t.total / 1.05), '稅額': Math.round(t.tax), '總金額': Math.round(t.total), '稅別': t.taxType === 'inc' ? '內含' : '外加', '備註': t.note }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "銷項發票明細");
                XLSX.writeFile(wb, `-公司-_銷項發票報表_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            return (
                <div className="grid grid-cols-2 gap-6 fade-in">
                    <div className="macaron-card p-6 border-orange-100">
                        <div className="flex items-center gap-2 mb-4">
                            <div className="bg-orange-100 p-2 rounded-full text-orange-500"><i data-lucide="clipboard-list"></i></div>
                            <h3 className="font-bold text-gray-700 text-lg">庫存盤點</h3>
                        </div>
                        <p className="text-sm text-gray-400 mb-6 pl-10">下載當前庫存 Excel，填寫實際盤點數量後再匯入更新。</p>
                        <div className="flex flex-col gap-4 pl-10">
                            <button onClick={exportStockTake} className="btn-macaron border-2 border-orange-300 text-orange-500 px-6 py-3 hover:bg-orange-400 hover:text-white transition">
                                <i data-lucide="download" className="inline w-4 h-4 mr-2"></i>下載盤點單 (XLSX)
                            </button>
                            <div className="border-2 border-dashed border-orange-200 p-6 rounded-2xl bg-orange-50/50 hover:bg-orange-50 transition cursor-pointer relative text-center">
                                <i data-lucide="upload" className="w-8 h-8 mx-auto text-orange-300 mb-2"></i>
                                <label className="block text-sm font-bold text-orange-400">上傳盤點結果</label>
                                <input type="file" onChange={importStockTake} accept=".xlsx" className="absolute inset-0 opacity-0 cursor-pointer w-full h-full" />
                            </div>
                        </div>
                    </div>

                    <div className="macaron-card p-6 border-blue-100">
                        <div className="flex items-center gap-2 mb-4">
                            <div className="bg-blue-100 p-2 rounded-full text-blue-500"><i data-lucide="file-spreadsheet"></i></div>
                            <h3 className="font-bold text-gray-700 text-lg">會計稅務報表</h3>
                        </div>
                        <p className="text-sm text-gray-400 mb-6 pl-10">匯出所有銷貨單據，包含未稅金額與營業稅額，供會計記帳使用。</p>
                        <div className="pl-10">
                            <button onClick={exportInvoices} className="btn-macaron bg-blue-400 text-white px-6 py-3 w-full hover:bg-blue-500 shadow-lg shadow-blue-200">
                                匯出銷項發票明細 (XLSX)
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
