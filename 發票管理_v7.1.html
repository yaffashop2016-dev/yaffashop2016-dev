        // --- Helper Functions ---
        const toChineseCurrency = (n) => {
            if (n === 0) return '零元整(發票大寫參考)';
            if (!n) return '';
            const unit = [['元', '萬', '億'], ['', '拾', '佰', '仟']];
            const digit = ['零', '壹', '貳', '參', '肆', '伍', '陸', '柒', '捌', '玖'];
            let num = Math.abs(n);
            let s = '';
            for (let i = 0; i < unit[0].length && num > 0; i++) {
                let p = '';
                for (let j = 0; j < unit[1].length && num > 0; j++) {
                    p = digit[num % 10] + unit[1][j] + p;
                    num = Math.floor(num / 10);
                }
                s = p.replace(/(零.)*零$/, '').replace(/^$/, '零') + unit[0][i] + s;
            }
            return s.replace(/(零.)*零元/, '元').replace(/(零.)+/g, '零').replace(/^整$/, '零元整') + '整';
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toISOString().split('T')[0];
        };
        
        const addDays = (dateStr, days) => {
             const d = new Date(dateStr);
             d.setDate(d.getDate() + parseInt(days));
             return d.toISOString().split('T')[0];
        };

        const getCurrentMonth = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        };

        // 計算發票期別 (兩個月一期)：回傳期別的起始月份字串 'YYYY-MM'
        const computeInvoicePeriod = (dateStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d)) return '';
            const y = d.getFullYear();
            const m = d.getMonth() + 1;
            const start = (m % 2 === 0) ? (m - 1) : m; // 偶數月屬於前一個期別起始月
            return `${y}-${String(start).padStart(2, '0')}`;
        };

        // 將儲存用的期別 (起始月 'YYYY-MM') 轉為顯示字串 'YYYY-MM~MM'
        const formatInvoicePeriodDisplay = (periodStart) => {
            if (!periodStart) return '';
            const parts = periodStart.split('-');
            if (parts.length < 2) return periodStart;
            const y = parts[0];
            let s = parseInt(parts[1], 10);
            if (isNaN(s)) return periodStart;
            // 強制起始月為奇數（每兩個月為一期，起始為 1,3,5...）
            if (s % 2 === 0) s = s - 1;
            const e = s + 1;
            return `${y}-${String(s).padStart(2,'0')}~${String(e).padStart(2,'0')}`;
        };

        const safeCSV = (str) => {
            const s = (str || '').toString().replace(/"/g, '""');
            if (s.includes(',') || s.includes('\n') || s.includes('"')) {
                return `"${s}"`;
            }
            return s;
        };

        // --- Main Application ---

            const [editingAccountingId, setEditingAccountingId] = useState(null);

            const [filterMonth, setFilterMonth] = useState(getCurrentMonth());

            // 計算對應稅額的近兩期 (每期兩個月)
            const taxStats = useMemo(() => {
                // 根據 filterMonth 確定發票期別 (每兩個月一期：1-2、3-4、5-6...)
                // 建立一個臨時日期字串來計算期別
                const tempDateStr = (filterMonth || new Date().toISOString().slice(0,7)) + '-15';
                const currInvoicePeriod = computeInvoicePeriod(tempDateStr);
                
                // 計算前一期的期別
                let prevInvoicePeriod = '';
                if (currInvoicePeriod) {
                    const parts = currInvoicePeriod.split('-');
                    let year = parseInt(parts[0], 10);
                    let startMonth = parseInt(parts[1], 10);
                    // 前一期是前兩個月
                    startMonth -= 2;
                    if (startMonth <= 0) {
                        startMonth += 12;
                        year -= 1;
                    }
                    prevInvoicePeriod = `${year}-${String(startMonth).padStart(2, '0')}`;
                }

                const compute = (invoicePeriod) => {
                    if (!invoicePeriod) {
                        return {
                            salesTax: 0, salesTotal: 0,
                            purchaseTax: 0, purchaseTotal: 0,
                            taxBalance: 0
                        };
                    }
                    // 篩選指定發票期別的發票
                    const invoices = records.filter(r => {
                        if (r.recordType !== 'invoice' || r.isVoided) return false;
                        const rPeriod = computeInvoicePeriod(r.invoicePeriod || r.date || '');
                        return rPeriod === invoicePeriod;
                    });
                    const invSales = invoices.filter(i => i.type === 'sales');
                    const invPurchases = invoices.filter(i => i.type === 'purchase');
                    // adjust tax amounts by discount
                    const salesTax = invSales.reduce((acc, cur) => {
                        const discount = parseFloat(cur.discountAmount) || 0;
                        let actualTax = cur.taxAmount || 0;
                        if (discount > 0) {
                            const discountTax = Math.round(discount * 0.05 / 1.05);
                            actualTax = Math.max(0, actualTax - discountTax);
                        }
                        return acc + actualTax;
                    }, 0);
                    const salesTotal = invSales.reduce((acc, cur) => {
                        const discount = parseFloat(cur.discountAmount) || 0;
                        return acc + ((cur.totalAmount || 0) - discount);
                    }, 0);
                    const purchaseTax = invPurchases.reduce((acc, cur) => {
                        // 收據/無收據不納入進項稅額計算（無抵稅）
                        if (['receipt','noReceipt'].includes(cur.format)) return acc;
                        const discount = parseFloat(cur.discountAmount) || 0;
                        let actualTax = cur.taxAmount || 0;

                    return acc + ((cur.totalAmount || 0) - discount);

                const generalIncome = generalRecords.filter(g => g.type === 'income').reduce((acc, cur) => acc + (parseInt(cur.totalAmount) || 0), 0);
                
                const storeInvExpense = storeInvoices.filter(i => i.type === 'purchase').reduce((acc, cur) => {
                    const discount = parseFloat(cur.discountAmount) || 0;
                    return acc + ((cur.totalAmount || 0) - discount);
                }, 0);
                const generalExpense = generalRecords.filter(g => g.type === 'expense').reduce((acc, cur) => acc + (parseInt(cur.totalAmount) || 0), 0);

                return {
                    salesTax, salesTotal,
                    purchaseTax, purchaseTotal,
                    taxBalance: salesTax - purchaseTax,
                    storeIncome: storeInvIncome + generalIncome,
                    storeExpense: storeInvExpense + generalExpense,
                    storeNet: (storeInvIncome + generalIncome) - (storeInvExpense + generalExpense)
                };
            }, [records, filterMonth]);

            const displayedRecords = useMemo(() => {
                // Helper to check if a month is within the range
                const isInPeriodRange = (monthStr) => {
                    if (!invoicePeriodStart && !invoicePeriodEnd) return true;
                    const start = invoicePeriodStart || '1900-01';
                    const end = invoicePeriodEnd || '2099-12';
                    return monthStr >= start && monthStr <= end;
                };

                return records
                    .filter(r => r.date.startsWith(filterMonth))
                    .filter(r => {
                        // Only filter invoices by period range
                        if (r.recordType !== 'invoice') return true;
                        const invoicePeriod = computeInvoicePeriod(r.invoicePeriod || r.date || '');
                        return isInPeriodRange(invoicePeriod);
                    })
                    .filter(r => {
                        if (filterType === 'invoice') return r.recordType === 'invoice';
                        if (filterType === 'general') return r.recordType === 'general';
                        if (filterType === 'monthly') return r.recordType === 'monthly_entry';
                        if (filterType === 'store_only') {
                            return r.recordType === 'general' || (r.recordType === 'invoice' && r.isStoreTransaction);
                        }
                        return true;
                    })
                    .filter(r => {
                        if (filterInvoiceFormat === 'all') return true;
                        if (r.recordType !== 'invoice') return false;
                        return r.format === filterInvoiceFormat;
                    })
                    .filter(r => {
                        const term = searchTerm.toLowerCase();
                        if (r.recordType === 'invoice') {
                            return r.invoiceNumber.toLowerCase().includes(term) || 
                                   r.partyName.toLowerCase().includes(term) ||
                                   (r.partyId && r.partyId.includes(term)) ||
                                   (r.note && r.note.toLowerCase().includes(term)) ||
                                   (r.discountNote && r.discountNote.toLowerCase().includes(term)) ||
                                   (r.items && r.items.some(i => i.name.toLowerCase().includes(term))) ||
                                   (term.includes('作廢') && r.isVoided) ||
                                   ((term.includes('折讓') || term.includes('discount')) && (parseFloat(r.discountAmount) || 0) > 0);
                        } else if (r.recordType === 'monthly_entry') {
                            return r.supplierName.toLowerCase().includes(term) || 
                                   (r.note && r.note.toLowerCase().includes(term));
                        } else {
                            return r.title.toLowerCase().includes(term) ||
                                   (r.note && r.note.toLowerCase().includes(term));
                        }
                    })
                    .filter(r => {
                        if (!paymentFilter || paymentFilter === 'all') return true;
                        // 判斷是否為已開立發票
                        const isInvoice = r.recordType === 'invoice';
                        const totalAmt = parseFloat(r.totalAmount || r.amount || 0) || 0;
                        const paidVal = isInvoice ? (r.payments || []).reduce((s,p) => s + (parseFloat(p.amount)||0), 0) : 0;

                        if (paymentFilter === 'paid') {
                            return isInvoice && totalAmt > 0 && paidVal >= totalAmt;
                        }
                        if (paymentFilter === 'partial') {
                            if (isInvoice) {
                                return paidVal > 0 && paidVal < totalAmt;
                            }
                            // 一般門市收支，訂金視為部分付
                            return r.recordType === 'general' && r.paymentStatus === 'deposit';
                        }
                        if (paymentFilter === 'unpaid') {
                            if (isInvoice) {
                                return totalAmt > 0 && paidVal === 0;
                            }
                            return r.recordType === 'general' && r.paymentStatus === 'unpaid';
                        }
                        if (paymentFilter === 'no_invoice') {
                            // 未開發票：非發票紀錄（例如月結暫估）
                            return !isInvoice;
                        }
                        return true;
                    })
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [records, filterMonth, searchTerm, filterType, paymentFilter, invoicePeriodStart, invoicePeriodEnd]);

            // ------ 折讓/作廢管理資料 ------
            const adjustedRecords = useMemo(() => {
                return records.filter(r => r.recordType === 'invoice' && (r.isVoided || (parseFloat(r.discountAmount) || 0) > 0));
            }, [records]);

            const adjustedDisplayRecords = useMemo(() => {
                let arr = adjustedRecords.filter(r => {
                    const term = adjustmentSearch.toLowerCase();
                    return r.invoiceNumber.toLowerCase().includes(term) ||
                           r.partyName.toLowerCase().includes(term) ||
                           (r.partyId && r.partyId.toLowerCase().includes(term)) ||
                           (r.discountNote && r.discountNote.toLowerCase().includes(term));
                });
                // sorting
                arr.sort((a,b) => {
                    const field = adjustmentSort.field;
                    let av = a[field] || '';
                    let bv = b[field] || '';
                    if (field === 'date') {
                        const da = new Date(av);
                        const db = new Date(bv);
                        return adjustmentSort.asc ? da - db : db - da;
                    }
                    if (field === 'invoiceNumber') {
                        return adjustmentSort.asc ? av.localeCompare(bv) : bv.localeCompare(av);
                    }
                    if (field === 'discountAmount') {
                        const da = parseFloat(a.discountAmount) || 0;
                        const db = parseFloat(b.discountAmount) || 0;
                        return adjustmentSort.asc ? da - db : db - da;
                    }
                    return 0;
                });
                return arr;
            }, [adjustedRecords, adjustmentSearch, adjustmentSort]);

            const exportAdjustedRecords = () => {

            const partnerStats = useMemo(() => {
                const stats = {};
                records.forEach(r => {
                    let name = '', id = '', date = r.date, type = '';
                    
                    if (r.recordType === 'invoice' && r.partyName && r.partyName.trim() !== '') {
                        name = r.partyName.trim();
                        id = r.partyId || '';
                        type = r.type;
                    } else if (r.recordType === 'monthly_entry' && r.supplierName && r.supplierName.trim() !== '') {
                        name = r.supplierName.trim();
                        type = r.type || 'purchase'; 
                    }

                    if (name) {
                        if (!stats[name]) {
                            stats[name] = {
                                name: name,
                                id: id,
                                count: 0,
                                lastDate: date,
                                types: new Set(),
                                records: [] 
                            };
                        }
                        stats[name].count += 1;
                        stats[name].types.add(type);
                        stats[name].records.push({...r, totalAmount: r.totalAmount || (parseFloat(r.amount) || 0) });
                        
                        if (new Date(date) >= new Date(stats[name].lastDate)) {
                             stats[name].lastDate = date;
                             if (id) stats[name].id = id;
                        } else if (!stats[name].id && id) {
                            stats[name].id = id;
                        }
                    }
                });
                return Object.values(stats)
                    .filter(p => p.name.toLowerCase().includes(partnerSearch.toLowerCase()) || p.id.includes(partnerSearch))
                    .sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate));
            }, [records, partnerSearch]);

            const productStats = useMemo(() => {
                const stats = {};
                records.forEach(r => {
                    if (r.recordType === 'invoice' && r.items) {
                         r.items.forEach(item => {
                             const name = item.name.trim();
                             if(!name) return;
                             if (!stats[name]) {
                                 stats[name] = {
                                     name: name,
                                     totalQty: 0,
                                     totalAmount: 0,
                                     lastDate: r.date,
                                     count: 0,
                                     partners: new Set()
                                 };
                             }
                             const qty = parseFloat(item.qty) || 0;
                             const price = parseFloat(item.price) || 0;
                             stats[name].totalQty += qty;
                             stats[name].totalAmount += (qty * price);
                             stats[name].count += 1;
                             
                             if (new Date(r.date) > new Date(stats[name].lastDate)) {
                                 stats[name].lastDate = r.date;
                             }
                             if (r.partyName) {
                                 stats[name].partners.add(r.partyName);
                             }
                         });
                    }
                });
                return Object.values(stats)
                    .filter(p => p.name.toLowerCase().includes(productSearch.toLowerCase()))
                    .sort((a, b) => b.totalAmount - a.totalAmount); 
            }, [records, productSearch]);

            // --- Handlers ---

                     recordType: 'monthly_entry', type: 'purchase', date: formatDate(new Date()), supplierName: '', amount: '', paymentTerms: '30', dueDate: addDays(new Date(), 30), note: ''
                });
                // 同時清空折讓/作廢表單

            const handleAutoNextNumber = () => {
                if (invoiceForm.type !== 'sales') {
                    showNotify('自動取號功能僅適用於「銷項」(開立) 發票', 'error');
                    return;
                }

                const currentFormat = invoiceForm.format;
                const relevantLast = currentFormat === 'triplicate' ? lastInvoiceStats.lastTriplicate : lastInvoiceStats.lastDuplicate;

                if (!relevantLast || !relevantLast.invoiceNumber) {
                    showNotify('尚無此類別的歷史「銷項」發票可參考', 'error');
                    return;
                }

                const lastNum = relevantLast.invoiceNumber;
                const match = lastNum.match(/^([A-Za-z]*)([0-9]+)$/);
                
                if (match) {
                    const prefix = match[1];
                    const numStr = match[2];
                    const numLen = numStr.length;
                    const nextNumVal = parseInt(numStr, 10) + 1;
                    const nextNumStr = nextNumVal.toString().padStart(numLen, '0');
                    const newInvoiceNum = prefix + nextNumStr;
                    setInvoiceForm(prev => ({ ...prev, invoiceNumber: newInvoiceNum }));
                    showNotify(`已自動帶入號碼: ${newInvoiceNum}`);

                     showNotify('無法解析上一筆號碼格式，請手動輸入', 'error');
                }
            };

            const handleInvoiceChange = (e) => {

                    }));

            const convertMonthlyToInvoice = (monthlyRecord) => {
                if(!confirm(`確定要將「${monthlyRecord.supplierName}」的暫估資料轉為正式發票？\n系統將自動帶入金額與日期資料。`)) return;
                
                const isSales = monthlyRecord.type === 'sales';

                    paymentDueDate: monthlyRecord.dueDate,
                    items: [{ id: Date.now(), name: monthlyRecord.note || (isSales ? '銷貨貨款' : '進貨貨款'), qty: 1, price: monthlyRecord.amount }],
                    amountType: 'inclusive',

            const submitInvoice = (e) => {
                e.preventDefault();
                // 收據/無收據不需要發票號碼，其他類型需要
                if (!['receipt','noReceipt'].includes(invoiceForm.format) && !invoiceForm.invoiceNumber) return showNotify('請輸入發票號碼', 'error');

                // 作廢與折讓為互斥（財務規則）
                if (invoiceForm.isVoided && (parseFloat(invoiceForm.discountAmount) || 0) > 0) {
                    return showNotify('作廢發票不可同時設定折讓金額', 'error');
                }

                const existingEditing = editingId ? records.find(r => r.id === editingId) : null;
                // 收據/無收據不進行號碼重複檢查
                if (!['receipt','noReceipt'].includes(invoiceForm.format) && (!editingId || (editingId && existingEditing && existingEditing.invoiceNumber !== invoiceForm.invoiceNumber))) {
                    if (records.some(r => r.id !== editingId && r.recordType === 'invoice' && r.invoiceNumber === invoiceForm.invoiceNumber && r.type === invoiceForm.type)) {
                        return showNotify('發票號碼重複', 'error');
                    }
                }

                const newId = Date.now().toString();
                const now = new Date().toISOString();

                // Remove legacy payment fields from the saved record to clean up data
                const { paymentStatus, depositAmount, ...cleanForm } = invoiceForm;

                const recordData = {
                    ...cleanForm,
                    ...invoiceCalculated,
                    updatedAt: now
                };

                // 作廢發票不可有折讓：再次強制
                if (recordData.isVoided) {
                    recordData.discountAmount = 0;
                    recordData.discountNote = recordData.discountNote || '';
                }

                // normalize the period in case user manipulated or old data has wrong value
                recordData.invoicePeriod = computeInvoicePeriod(recordData.invoicePeriod || recordData.date);

                if (recordData.sourceMonthlyId) {
                    delete recordData.sourceMonthlyId;
                }

                if (editingId) {
                    setRecords(prev => prev.map(r => r.id === editingId ? { ...recordData, id: editingId, createdAt: r.createdAt } : r));
                    showNotify('發票修改成功');
                    setEditingId(null);
                } else {
                    setRecords(prev => {
                        const newRecord = { ...recordData, id: newId, createdAt: now };
                        let updatedList = [newRecord, ...prev];
                        if (invoiceForm.sourceMonthlyId) {
                            updatedList = updatedList.filter(r => r.id !== invoiceForm.sourceMonthlyId);

            const exportToExcel = (opts = {}) => {
                const { ignoreDate = false } = opts;

                    return showNotify("Excel 元件載入失敗，請檢查網路連線", "error");
                }

                // Helper to format payments for Excel
                const getPaymentDetails = (record) => {
                    if (!record.payments || record.payments.length === 0) return '未付款';
                    const details = record.payments.map(p => `${p.date} [${p.method}] $${p.amount}`).join('; ');
                    const totalPaid = record.payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
                    const remaining = (record.totalAmount || 0) - totalPaid;
                    if (remaining <= 0) return `已付清 (${details})`;
                    return `部分付: $${totalPaid} (餘 $${remaining}) - 詳細: ${details}`;
                };

                // 日期範圍篩選
                const isInExportRange = (dateStr) => {
                    if (ignoreDate) return true;
                    if ((!exportStartDate && !exportEndDate) || !dateStr) return true;
                    const d = new Date(dateStr);
                    if (exportStartDate && d < new Date(exportStartDate)) return false;
                    if (exportEndDate && d > new Date(exportEndDate)) return false;
                    return true;
                };

                // If user selected a specific invoice period range, limit exported invoices to that range
                const isInPeriodRange = (monthStr) => {
                    if (!invoicePeriodStart && !invoicePeriodEnd) return true;
                    const start = invoicePeriodStart || '1900-01';
                    const end = invoicePeriodEnd || '2099-12';
                    return monthStr >= start && monthStr <= end;
                };
                const exportRecords = records.filter(r => 
                    isInExportRange(r.date) &&
                    (r.recordType !== 'invoice' || isInPeriodRange(computeInvoicePeriod(r.invoicePeriod || r.date || '')))

                // 1. Accountant Data (Sheet 1)
                const accountantData = exportRecords
                    .filter(r => r.recordType === 'invoice')

                        // calculate adjusted values taking discount into account
                        const discount = parseFloat(r.discountAmount) || 0;
                        let actualSalesAmount = r.salesAmount;
                        let actualTaxAmount = r.taxAmount;
                        if (discount > 0 && !r.isVoided) {
                            const discountTax = Math.round(discount * 0.05 / 1.05);
                            actualTaxAmount = Math.max(0, r.taxAmount - discountTax);
                            actualSalesAmount = Math.max(0, r.salesAmount - (discount - discountTax));
                        }
                        return {
                            "日期": r.date,

                            "訂貨日": r.orderDate || '',
                            "收貨日": r.deliveryDate || '',
                            "備註": noteWithRef

                    .sort((a, b) => new Date(a.date) - new Date(b.date))
                    .map(r => {

                             isIncome = r.type === 'income';

                             isIncome = r.type === 'sales';

                             nameStr = r.supplierName + '(未開發票)';

                        if (isIncome) totalIncome += amount;

                            "備註": noteWithRef

                        return {

                            "發票號碼": r.recordType === 'invoice' ? r.invoiceNumber : '',
                            "發票日期": r.recordType === 'invoice' ? r.date : '',
                            "備註": r.note
                        };
                    });


                const wb = XLSX.utils.book_new();

                const wsAccountant = XLSX.utils.json_to_sheet(accountantData);
                XLSX.utils.book_append_sheet(wb, wsAccountant, "會計發票專用");

                const wsManager = XLSX.utils.json_to_sheet([]);

                XLSX.utils.sheet_add_json(wsManager, managerData, { origin: "A6" });

                XLSX.utils.sheet_add_aoa(wsStore, [["門市現金帳 (交班對帳用)", ""]], { origin: "A1" });
                XLSX.utils.sheet_add_json(wsStore, storeData, { origin: "A2" });
                XLSX.utils.book_append_sheet(wb, wsStore, "門市現金帳");

                XLSX.writeFile(wb, `林楊五金_財務報表_v2.17_${new Date().toISOString().slice(0,10)}.xlsx`);
                showNotify("Excel (含付款明細) 報表匯出成功");
            };

                        } else {
                            inputTotal += (amt - discount);

                        }

                            storeIncome += amt;

                csvRows.push(``); 
                csvRows.push(headers.join(',')); 

                records.forEach(r => {
                    const isInv = r.recordType === 'invoice';
                    let categoryStr = '雜項';
                    if (isInv) categoryStr = (r.type === 'sales') ? '銷項' : '進項';
                    else if (r.recordType === 'monthly_entry') categoryStr = r.type === 'sales' ? '月結銷貨(暫估)' : '月結進貨(暫估)';

                    const flowStr = (r.type === 'sales' || r.type === 'income') ? '收入' : '支出';
                    const dateStr = r.date;
                    const storeFlag = ((isInv && r.isStoreTransaction) || !isInv) ? '是' : '否';
                    const discountAmt = isInv ? (parseFloat(r.discountAmount) || 0) : '';
                    const voidFlag = isInv ? (r.isVoided ? '是' : '否') : '';
                    
                    const oDate = r.orderDate || '';
                    const dDate = r.deliveryDate || '';
                    const dueData = r.paymentDueDate || r.dueDate || ''; 
                    
                    const totalAmt = r.totalAmount || r.amount;
                    
                    // CSV calc for payments
                    let paidVal = 0;
                    let remainVal = totalAmt;
                    let statusStr = 'unpaid';
                    
                    if (isInv) {
                        paidVal = (r.payments||[]).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
                        remainVal = totalAmt - paidVal;
                        if(paidVal >= totalAmt && totalAmt > 0) statusStr = 'paid';
                        else if(paidVal > 0) statusStr = 'partial';

                            if (isInv && r.items && r.items.length > 0) {

                                categoryStr, flowStr, safeCSV(r.invoiceNumber ? `="${r.invoiceNumber}"` : ''), dateStr, safeCSV(r.partyName),
                                formatInvoicePeriodDisplay(r.invoicePeriod || computeInvoicePeriod(r.date)), safeCSV(r.partyId ? `="${r.partyId}"` : ''), safeCSV(item.name), item.qty, item.price, Math.round(itemSubtotal), taxVal,
                                discountAmt, voidFlag,
                                safeCSV(r.note), totalAmt, storeFlag,
                                statusStr, oDate, dDate, dueData, paidVal, remainVal
                            ];
                            csvRows.push(row.join(','));

                        ];
                        csvRows.push(row.join(','));
                    }

                                                                                <div className="font-bold text-teal-800 mb-2">相關交易對象 (供應商/客戶):</div>
                                                                                <div className="flex flex-wrap gap-2">
                                                                                    {[...prod.partners].map((partnerName, idx) => (
                                                                                        <span key={idx} className="bg-teal-100 text-teal-800 px-2 py-1 rounded text-xs">
                                                                                            {partnerName}
                                                                                        </span>
                                                                                    ))}
                                                                                    {prod.partners.size === 0 && <span className="text-gray-400">無相關對象記錄</span>}
                                                                                </div>
                                                                            </div>
                                                                        </td>
                                                                    </tr>
                                                                )}
                                                            </React.Fragment>
                                                        );
                                                    })
                                                ) : (
                                                    <tr>
                                                        <td colSpan="4" className="px-6 py-12 text-center text-gray-400">
                                                            {productSearch ? '找不到符合的產品' : '尚無產品資料'}
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 6. Settings */}
                        {activeTab === 'settings' && (
                             <div className="max-w-4xl mx-auto space-y-6 fade-in">
                                {/* 操作指引 */}
                                <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                    <h3 className="font-semibold text-blue-900 mb-2 flex items-center gap-2">
                                        <HelpCircle size={16} />
                                        操作指引
                                    </h3>
                                    <ul className="text-sm text-blue-800 space-y-1 ml-6 list-disc">
                                        <li><strong>產品設定：</strong> 設定 10 組常用品項，在發票開立時點擊快選按鈕即可快速帶入</li>
                                        <li><strong>匯出報表：</strong> 可指定日期範圍匯出 Excel 格式的會計報表（含發票、收支總覽、門市帳）</li>
                                        <li><strong>完整備份：</strong> 下載 JSON 檔案完整備份所有資料（包含所有發票、設定、廠商等）</li>
                                        <li><strong>還原資料：</strong> 上傳之前下載的 JSON 檔案可完整還原所有資料</li>
                                        <li><strong>清空重置：</strong> 務必先下載備份再使用此功能，清空重置後資料無法恢復</li>
                                    </ul>
                                </div>
                                {/* Product Presets */}
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-purple-700">
                                        <Zap className="text-purple-600"/> 自訂產品設定 (快選清單)
                                    </h2>
                                    <p className="text-sm text-gray-500 mb-4">
                                        設定 10 組常用產品，設定完成後，在「正規發票開立」頁面會出現快選按鈕，點擊即可快速帶入。
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {productPresets.map((preset, idx) => (
                                            <div key={idx} className="flex gap-2 items-center bg-gray-50 p-2 rounded border border-gray-200">
                                                <span className="text-gray-400 text-sm w-6">{idx + 1}.</span>
                                                <input 
                                                    type="text" 
                                                    placeholder="產品名稱" 
                                                    value={preset.name}
                                                    onChange={(e) => updatePreset(idx, 'name', e.target.value)}
                                                    className="border rounded px-2 py-1 text-sm flex-1"
                                                />
                                                <input 
                                                    type="number" 
                                                    placeholder="單價" 
                                                    value={preset.price}
                                                    onChange={(e) => updatePreset(idx, 'price', e.target.value)}
                                                    className="border rounded px-2 py-1 text-sm w-20"
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Excel Export & Import */}
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                        <Download className="text-green-600"/> 報表匯出與編輯
                                    </h2>
                                    <p className="text-sm text-gray-500 mb-4">
                                        Excel 匯出包含「會計發票專用」、「主管收支總覽」與「門市現金帳」三個分頁。
                                    </p>
                                    
                                    <div className="grid grid-cols-1 gap-4">
                                        {/* NEW: Export date range */}
                                        <div className="flex flex-col md:flex-row gap-4">
                                            <div className="flex flex-col">
                                                <label className="text-xs font-medium text-gray-700 mb-1">起始日期</label>
                                                <input
                                                    type="date"
                                                    value={exportStartDate}
                                                    onChange={(e) => setExportStartDate(e.target.value)}
                                                    className="border rounded-lg p-2 text-sm"
                                                />
                                            </div>
                                            <div className="flex flex-col">
                                                <label className="text-xs font-medium text-gray-700 mb-1">結束日期</label>
                                                <input
                                                    type="date"
                                                    value={exportEndDate}
                                                    onChange={(e) => setExportEndDate(e.target.value)}
                                                    className="border rounded-lg p-2 text-sm"
                                                />
                                            </div>
                                        </div>
                                        <p className="text-xs text-gray-500">指定日期區間後按下匯出僅會包含該範圍內資料；不選日期則可匯出全部。</p>
                                        {/* NEW: Excel Export Button */}
                                        <button onClick={() => exportToExcel()} className="w-full bg-green-600 hover:bg-green-700 text-white p-4 rounded-lg flex items-center justify-center gap-2 transition-colors shadow-md text-lg font-bold">
                                            <Sheet size={24}/> 1. 匯出 Excel (3分頁) 報表 (推薦)
                                        </button>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                                            <button onClick={exportCSV} className="w-full bg-gray-100 border border-gray-300 text-gray-600 p-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-200 transition-colors text-sm">
                                                <FileText size={16}/> 匯出明細 CSV (舊版格式/備份用)
                                            </button>

                                            <label className="w-full bg-white border border-green-300 border-dashed text-green-700 p-3 rounded-lg flex items-center justify-center gap-2 hover:bg-green-50 transition-colors cursor-pointer text-sm">
                                                <Upload size={16}/> 2. 匯入 CSV (覆蓋)
                                                <input type="file" accept=".csv" onChange={importCSV} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                {/* Backup & Restore */}
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                        <FileJson className="text-blue-600"/> 系統備份與還原
                                    </h2>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-3">
                                            <h3 className="font-medium text-gray-800">備份資料 (JSON)</h3>
                                            <button onClick={exportJSON} className="border border-gray-300 text-gray-700 w-full py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-50 text-sm">
                                                <Download size={16}/> 下載完整備份
                                            </button>
                                        </div>

                                        <div className="space-y-3 border-t md:border-t-0 md:border-l md:pl-6 pt-4 md:pt-0 border-gray-100">
                                            <h3 className="font-medium text-gray-800">匯入還原 (JSON)</h3>
                                            <label className="border border-blue-200 bg-blue-50 text-blue-700 w-full py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-100 cursor-pointer text-sm">
                                                <Upload size={16}/> 選取備份檔還原
                                                <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                {/* Danger Zone */}
                                <div className="bg-red-50 rounded-xl border border-red-100 p-6 mt-8">
                                    <h2 className="text-lg font-bold text-red-700 mb-2">危險操作</h2>
                                    <p className="text-sm text-red-600 mb-4">清空所有資料，此動作無法復原，請確認已備份。</p>
                                    <button 
                                        onClick={() => {
                                            if(confirm('警告：確定清除所有資料？') && prompt('輸入 DELETE') === 'DELETE') {
                                                setRecords([]);
                                                showNotify('資料已清空', 'error');
                                            }
                                        }}
                                        className="bg-white border border-red-200 text-red-600 px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-red-50 text-sm w-full md:w-auto"
                                    >
                                        <Trash2 size={16}/> 清空重置系統
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 7. Help Page */}
                        {activeTab === 'help' && (
                            <div className="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200 fade-in">
                                <h2 className="text-2xl font-bold mb-6 flex items-center gap-3 text-gray-800">
                                    <HelpCircle size={32} className="text-blue-600" />
                                    功能操作說明
                                </h2>
                                
                                <div className="space-y-8">
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">v2.21 新增：進項「無收據」與收據稅額排除（NEW）</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">進項新增選項：</span> 「正規發票開立」中進項可選「三聯式」、「二聯式」或「無收據」。</li>
                                            <li><span className="font-bold text-gray-800">無收據處理：</span> 選擇「無收據」時，系統不要求發票號碼，並自動將稅額設為 0。</li>
                                            <li><span className="font-bold text-gray-800">稅額統計優化：</span> 「列表與報表」中進項稅額統計不含無收據稅額，僅計算可抵稅發票稅額。</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">v2.19 發票期別稅額計算最佳化 (NEW)</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">期別式稅額統計：</span> 「列表與報表」上方的稅額卡片現已根據「發票期別」（每兩個月為一期：1-2月、3-4月...）統計計算，與稅務申報期別完全一致。</li>
                                            <li><span className="font-bold text-gray-800">自動月份對應：</span> 選擇篩選月份時，系統會自動計算該月份所屬的發票期別，顯示「前一期」和「當期」的稅額。</li>
                                            <li><span className="font-bold text-gray-800">核對確認：</span> 依「列表與報表」中的稅額統計結合發票期別區間篩選，即可快速核對應繳稅額。</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">v2.18 Excel CSV 匯出優化</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">防止開頭 0 消失：</span> 修正了「廠商客戶清單」與「帳務明細 CSV」在 Excel 開啟時，統一編號與發票號碼開頭的 0 會被自動移除的問題。現在系統會強制 Excel 以文字格式讀取這些欄位。</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">v2.17 多重付款與編輯鎖定</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">多筆付款歷程：</span> 現在支援單張發票記錄多筆付款（例如：先收訂金、再收尾款、多次匯款）。</li>
                                            <li><span className="font-bold text-gray-800">付款狀態自動計算：</span> 系統會根據所有付款紀錄的總和，自動顯示「未付」、「部分付」或「已付清」。</li>
                                            <li><span className="font-bold text-gray-800">編輯安全鎖：</span> 編輯既有發票時，「發票號碼」與「日期」預設為鎖定狀態，防止誤改。需點擊標題旁的「🔓 解鎖」按鈕才能修改。</li>
                                            <li><span className="font-bold text-gray-800">舊資料升級：</span> 舊版本的付款狀態會自動轉換為新的付款紀錄格式，無需手動調整。</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">操作流程 (給新使用者)</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">開立發票：</span> 前往「正規發票開立」填寫發票日期、發票號碼、統一編號與對象，新增品項後按 <span className="font-medium">儲存</span>。系統會依據發票日期自動將發票歸類到「兩個月一期」的發票期別 (例如 1-2 月、3-4 月)。</li>
                                            <li><span className="font-bold text-gray-800">查詢與篩選：</span> 在「列表與報表」頁面使用上方的月份、類型、發票期別區間與關鍵字搜尋快速過濾紀錄。</li>
                                            <li><span className="font-bold text-gray-800">付款與狀態：</span> 可在發票內新增多筆付款紀錄；系統會自動計算並顯示「未付款 / 部分付 / 已付清」。</li>
                                            <li><span className="font-bold text-gray-800">月結 / 暫估：</span> 若有月結交易，請於「月結/暫估」新增紀錄，之後可點選該列「轉正」將暫估轉為正式發票。</li>
                                            <li><span className="font-bold text-gray-800">匯出與備份：</span> 可匯出 CSV/Excel 做會計或管理報表，也可下載 JSON 完整備份；匯入 JSON 可還原資料。</li>
                                            <li><span className="font-bold text-gray-800">移交與重置：</span> 移交系統給他人時，請先在「備份資料 (JSON)」下載檔案；若要清空系統，務必先備份再使用「清空重置系統」功能。</li>
                                            <li><span className="font-bold text-gray-800">折讓/作廢管理：</span> 前往「折讓/作廢」分頁，輸入發票號碼可快速標記為折讓或作廢。折讓時請填寫金額與說明；作廢則只需勾選。列表支援關鍵字搜尋、點欄位排序，用於查找與匯出（Excel）帳務調整紀錄。</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">v2.20 新增：備用金提醒與會計費用頁面</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">補備用金提醒：</span> 在「列表與報表」的門市淨現金流區塊新增警示，當累計現金餘額低於 5,000 時顯示醒目提示。</li>
                                            <li><span className="font-bold text-gray-800">會計費用管理：</span> 新增「會計費用」分頁，可紀錄每期會計師記帳報稅金額（包含各種進項稅、銷項稅、留抵、記帳費等），並自動計算合計。</li>
                                            <li><span className="font-bold text-gray-800">發票日期顯示改善：</span> 正規發票頁面改為多行標籤避免遮蔽，保證欄位標題清晰可見。</li>
                                        </ul>
                                    </section>
                                    <section>
                                        <h3 className="text-lg font-bold text-blue-700 border-b border-blue-100 pb-2 mb-3">v2.16 自動取號邏輯</h3>
                                        <ul className="list-disc list-inside space-y-2 text-gray-600 text-sm leading-relaxed">
                                            <li><span className="font-bold text-gray-800">自動取號：</span> 發票號碼旁的「+1 接續」按鈕，現在僅在選擇「銷項(開立)」時才會出現。</li>
                                            <li><span className="font-bold text-gray-800">邏輯鎖定：</span> 點擊自動取號時，系統會強制接續上一張「銷項」的二聯或三聯發票號碼，不會受進項發票影響。</li>
                                        </ul>
                                    </section>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InvoiceSystem />);
    </script>
</body>
</html>
